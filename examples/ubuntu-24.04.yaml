apiVersion: isoboot.github.io/v1alpha1
kind: BootArtifact
metadata:
  name: ubuntu-24.04-iso
  labels:
    app.kubernetes.io/name: isoboot
spec:
  url: https://releases.ubuntu.com/24.04/ubuntu-24.04.4-live-server-amd64.iso
  sha256: "e907d92eeec9df64163a7e454cbc8d7755e8ddc7ed42f99dbc80c40f1a138433"
---
# Mode B (ISO extraction): same as ubuntu-26.04 — the live-server installer
# (casper) boots the kernel/initrd extracted from the ISO and fetches its root
# filesystem (filesystem.squashfs) from the ISO over HTTP via url={{.ISOURL}},
# which isoboot serves from the same boot directory.
apiVersion: isoboot.github.io/v1alpha1
kind: BootConfig
metadata:
  name: ubuntu-24.04
  labels:
    app.kubernetes.io/name: isoboot
spec:
  iso:
    artifactRef: ubuntu-24.04-iso
    kernelPath: casper/vmlinuz
    initrdPath: casper/initrd
  kernelArgs: "console=ttyS0,115200 ip=dhcp url={{.ISOURL}} autoinstall ds=nocloud-net;s={{.ProvisionAutomationBaseURL}}/"
