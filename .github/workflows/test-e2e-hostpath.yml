name: E2E HostPath Tests

on:
  push:
    branches: [main]
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - 'Dockerfile'
      - 'config/**'
      - 'test/e2e/**'
      - '.github/workflows/test-e2e-hostpath.yml'
  pull_request:
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - 'Dockerfile'
      - 'config/**'
      - 'test/e2e/**'
      - '.github/workflows/test-e2e-hostpath.yml'

env:
  KIND_VERSION: v0.31.0
  # Debian point-release URLs (e.g. Debian13.3) are removed from the mirror
  # when the next point release ships. When that happens, update the URLs and
  # SHA256 values below to the new point release. There is no automated
  # detection for this — CI will fail with a download error when the URL goes
  # stale. Check https://deb.debian.org/debian/dists/ for current releases.
  # The "+" in the URL path (20250803+deb13u3) is a literal character, not a
  # space — "+" only has special meaning in query strings, not URL paths.
  VMLINUZ_SHA256: "6a6419fde155bc1be12f9d2555ad18876cdff111d80c2887c6aa2c5d6cb250ac"
  VMLINUZ_URL: "https://deb.debian.org/debian/dists/Debian13.3/main/installer-amd64/20250803+deb13u3/images/netboot/debian-installer/amd64/linux"
  # Artifact name is "vmlinuz" by convention; Debian names the kernel file "linux".
  VMLINUZ_NAME: debian-13-vmlinuz
  # Paths mirror the controller's storage layout: <data-dir>/artifacts/<artifact-name>/<filename>
  # See internal/controller/bootartifact_controller.go filePath().
  VMLINUZ_PATH: /tmp/isoboot-data/artifacts/debian-13-vmlinuz/linux
  INITRD_SHA256: "1e8e7112ada60c459bdfaa50872d3b7278b0cdbabb2414c394c29565435a03bd"
  INITRD_URL: "https://deb.debian.org/debian/dists/Debian13.3/main/installer-amd64/20250803+deb13u3/images/netboot/debian-installer/amd64/initrd.gz"
  INITRD_NAME: debian-13-initrd
  INITRD_PATH: /tmp/isoboot-data/artifacts/debian-13-initrd/initrd.gz

jobs:
  test-e2e-hostpath:
    name: Run on Ubuntu
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        shell: bash -eu -o pipefail {0}
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install kind ${{ env.KIND_VERSION }}
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/${{ env.KIND_VERSION }}/kind-linux-$(go env GOARCH)
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      # Controller runs as UID 65532 (nonroot) — own the dir so it can write
      - name: Create host data directory
        run: mkdir -p /tmp/isoboot-data && sudo chown 65532 /tmp/isoboot-data && sudo chmod 755 /tmp/isoboot-data

      - name: Create Kind cluster with hostPath mount
        run: kind create cluster --name isoboot-hostpath --config test/e2e/kind-config-hostpath.yaml

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build manager image with cache
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ghcr.io/isoboot/isoboot:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Load image into Kind cluster
        run: kind load docker-image ghcr.io/isoboot/isoboot:${{ github.sha }} --name isoboot-hostpath

      - name: Deploy controller with hostPath volume
        run: ./test/e2e/deploy-hostpath.sh ghcr.io/isoboot/isoboot:${{ github.sha }}

      - name: Wait for controller to be ready
        run: |
          kubectl -n isoboot-system wait --for=condition=Available deployment/isoboot-controller-manager --timeout=120s
          kubectl -n isoboot-system get pods

      # Restricted envsubst — variable list must match debian-13-bootartifacts.yaml.
      # Duplicated below for the second cluster; keep both in sync.
      - name: Create BootArtifacts for Debian 13 kernel and initrd
        run: envsubst '${VMLINUZ_NAME} ${VMLINUZ_URL} ${VMLINUZ_SHA256} ${INITRD_NAME} ${INITRD_URL} ${INITRD_SHA256}' < test/e2e/debian-13-bootartifacts.yaml | kubectl apply -f -

      # Sequential waits — see PR #254 "Accepted risks" for rationale.
      - name: Wait for Ready phase
        run: |
          ./test/e2e/wait-for-bootartifact.sh "${{ env.VMLINUZ_NAME }}"
          ./test/e2e/wait-for-bootartifact.sh "${{ env.INITRD_NAME }}"

      # SHA-256 verified 3× per artifact (download, post-delete, second cluster).
      # Each covers a different failure mode — do not consolidate.
      - name: Verify files and SHA-256 on host disk
        run: |
          echo "Checking vmlinuz at ${{ env.VMLINUZ_PATH }}"
          ls -la "${{ env.VMLINUZ_PATH }}"
          echo "${{ env.VMLINUZ_SHA256 }}  ${{ env.VMLINUZ_PATH }}" | sha256sum -c
          echo "Checking initrd at ${{ env.INITRD_PATH }}"
          ls -la "${{ env.INITRD_PATH }}"
          echo "${{ env.INITRD_SHA256 }}  ${{ env.INITRD_PATH }}" | sha256sum -c

      - name: Collect phase-1 logs on failure
        if: failure()
        run: |
          echo "=== BootArtifact status ==="
          kubectl get bootartifact "${{ env.VMLINUZ_NAME }}" -o yaml 2>/dev/null || true
          kubectl get bootartifact "${{ env.INITRD_NAME }}" -o yaml 2>/dev/null || true
          echo "=== Controller logs ==="
          kubectl -n isoboot-system logs deployment/isoboot-controller-manager 2>/dev/null || true
          echo "=== Host data directory ==="
          find /tmp/isoboot-data -type f 2>/dev/null || true

      - name: Delete first Kind cluster
        run: kind delete cluster --name isoboot-hostpath

      - name: Verify files persist after cluster deletion
        run: |
          echo "Cluster deleted — verifying files still exist on host"
          ls -la "${{ env.VMLINUZ_PATH }}"
          echo "${{ env.VMLINUZ_SHA256 }}  ${{ env.VMLINUZ_PATH }}" | sha256sum -c
          ls -la "${{ env.INITRD_PATH }}"
          echo "${{ env.INITRD_SHA256 }}  ${{ env.INITRD_PATH }}" | sha256sum -c
          echo "Files persist after cluster deletion"

      # --- Second cluster: verify controller recognises existing file without downloading ---

      - name: Record file modification times
        run: |
          declare -A paths=( [vmlinuz]="${{ env.VMLINUZ_PATH }}" [initrd]="${{ env.INITRD_PATH }}" )
          for artifact in "${!paths[@]}"; do
            stat -c '%Y' "${paths[$artifact]}" > "/tmp/mtime-${artifact}-before"
          done

      - name: Create second Kind cluster with same hostPath
        run: kind create cluster --name isoboot-hostpath --config test/e2e/kind-config-hostpath.yaml

      - name: Load image into second cluster
        run: kind load docker-image ghcr.io/isoboot/isoboot:${{ github.sha }} --name isoboot-hostpath

      - name: Deploy controller with hostPath volume (second cluster)
        run: ./test/e2e/deploy-hostpath.sh ghcr.io/isoboot/isoboot:${{ github.sha }}

      - name: Wait for controller to be ready (second cluster)
        run: |
          kubectl -n isoboot-system wait --for=condition=Available deployment/isoboot-controller-manager --timeout=120s
          kubectl -n isoboot-system get pods

      # Duplicated from above — GHA doesn't support YAML anchors.
      - name: Create same BootArtifacts (files already exist on host)
        run: envsubst '${VMLINUZ_NAME} ${VMLINUZ_URL} ${VMLINUZ_SHA256} ${INITRD_NAME} ${INITRD_URL} ${INITRD_SHA256}' < test/e2e/debian-13-bootartifacts.yaml | kubectl apply -f -

      - name: Wait for Ready phase (second cluster)
        run: |
          ./test/e2e/wait-for-bootartifact.sh "${{ env.VMLINUZ_NAME }}"
          ./test/e2e/wait-for-bootartifact.sh "${{ env.INITRD_NAME }}"

      - name: Verify files were not re-downloaded
        run: |
          # Associative arrays keep the loop body free of GHA expression expansion.
          declare -A paths=( [vmlinuz]="${{ env.VMLINUZ_PATH }}" [initrd]="${{ env.INITRD_PATH }}" )
          declare -A shas=( [vmlinuz]="${{ env.VMLINUZ_SHA256 }}" [initrd]="${{ env.INITRD_SHA256 }}" )
          for artifact in vmlinuz initrd; do
            mtime_before=$(cat "/tmp/mtime-${artifact}-before")
            path="${paths[$artifact]}"
            sha="${shas[$artifact]}"
            mtime_after=$(stat -c '%Y' "$path")
            echo "${artifact} mtime before: $mtime_before"
            echo "${artifact} mtime after:  $mtime_after"
            if [ "$mtime_before" != "$mtime_after" ]; then
              echo "FAIL: ${artifact} was re-downloaded (mtime changed)"
              exit 1
            fi
            echo "${artifact} was not re-downloaded — mtime unchanged"
            echo "${sha}  ${path}" | sha256sum -c
          done
          # Per-artifact grep — re-reconciliation can produce >1 line per artifact,
          # so we check presence rather than exact count. See PR #254.
          controller_logs=$(kubectl -n isoboot-system logs deployment/isoboot-controller-manager)
          [[ -n "$controller_logs" ]] || { echo "FAIL: controller logs are empty"; exit 1; }
          skip_msg="Artifact already on disk, skipping download"
          for name in "${{ env.VMLINUZ_NAME }}" "${{ env.INITRD_NAME }}"; do
            if ! printf '%s\n' "$controller_logs" | grep -F "$skip_msg" | grep -Fq "$name"; then
              echo "FAIL: no skip-download log line for $name"
              exit 1
            fi
          done
          echo "Controller logs confirm both existing files were recognised"

      - name: Collect logs on failure
        if: failure()
        run: |
          echo "=== BootArtifact status ==="
          kubectl get bootartifact "${{ env.VMLINUZ_NAME }}" -o yaml 2>/dev/null || true
          kubectl get bootartifact "${{ env.INITRD_NAME }}" -o yaml 2>/dev/null || true
          echo "=== Controller logs ==="
          kubectl -n isoboot-system logs deployment/isoboot-controller-manager 2>/dev/null || true
          echo "=== Host data directory ==="
          find /tmp/isoboot-data -type f 2>/dev/null || true

      # No /tmp/isoboot-data cleanup needed — GitHub CI runners are ephemeral.
      - name: Clean up clusters
        if: always()
        run: kind delete cluster --name isoboot-hostpath 2>/dev/null || true
