name: Helm Install Test

on:
  push:
    branches: [main]
    paths:
      - "charts/**"
      - "Dockerfile"
      - "Dockerfile.httpd"
      - "Dockerfile.dnsmasq"
      - "cmd/**"
      - "internal/**"
      - "api/**"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/test-helm.yml"
  pull_request:
    paths:
      - "charts/**"
      - "Dockerfile"
      - "Dockerfile.httpd"
      - "Dockerfile.dnsmasq"
      - "cmd/**"
      - "internal/**"
      - "api/**"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/test-helm.yml"

concurrency:
  group: helm-test-${{ github.ref }}
  cancel-in-progress: true

env:
  KIND_VERSION: v0.31.0
  IMG: ghcr.io/isoboot/isoboot:${{ github.sha }}
  IMG_HTTPD: ghcr.io/isoboot/isoboot-httpd:${{ github.sha }}
  IMG_DNSMASQ: ghcr.io/isoboot/isoboot-dnsmasq:${{ github.sha }}

jobs:
  helm-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build controller image
      uses: docker/build-push-action@v6
      with:
        context: .
        load: true
        tags: ${{ env.IMG }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build httpd image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: Dockerfile.httpd
        load: true
        tags: ${{ env.IMG_HTTPD }}
        cache-from: type=gha,scope=httpd
        cache-to: type=gha,mode=max,scope=httpd

    - name: Build dnsmasq image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: Dockerfile.dnsmasq
        load: true
        tags: ${{ env.IMG_DNSMASQ }}
        cache-from: type=gha,scope=dnsmasq
        cache-to: type=gha,mode=max,scope=dnsmasq

    - name: Install kind
      run: |
        curl -Lo ./kind https://kind.sigs.k8s.io/dl/${{ env.KIND_VERSION }}/kind-linux-amd64
        chmod +x ./kind
        sudo mv ./kind /usr/local/bin/kind

    - name: Create Kind cluster
      run: |
        sudo mkdir -p /tmp/isoboot-data
        sudo chown 65532:65532 /tmp/isoboot-data

        cat <<EOF | kind create cluster --name helm-test --config=-
        kind: Cluster
        apiVersion: kind.x-k8s.io/v1alpha4
        nodes:
        - role: control-plane
          extraMounts:
          - hostPath: /tmp/isoboot-data
            containerPath: /data/isoboot
        EOF

    - name: Load images into Kind
      run: |
        kind load docker-image ${{ env.IMG }} --name helm-test
        kind load docker-image ${{ env.IMG_HTTPD }} --name helm-test
        kind load docker-image ${{ env.IMG_DNSMASQ }} --name helm-test

    - name: Install Helm
      uses: azure/setup-helm@v4

    - name: Get Kind node name
      id: node
      run: echo "name=$(kubectl get nodes -o jsonpath='{.items[0].metadata.name}')" >> "$GITHUB_OUTPUT"

    - name: Helm install
      run: |
        helm install isoboot charts/isoboot \
          --namespace isoboot-system \
          --create-namespace \
          --set nodeName=${{ steps.node.outputs.name }} \
          --set image.repository=ghcr.io/isoboot/isoboot \
          --set image.tag=${{ github.sha }} \
          --set image.pullPolicy=Never \
          --set httpd.image.repository=ghcr.io/isoboot/isoboot-httpd \
          --set httpd.image.tag=${{ github.sha }} \
          --set dnsmasq.image.repository=ghcr.io/isoboot/isoboot-dnsmasq \
          --set dnsmasq.image.tag=${{ github.sha }} \
          --set dnsmasq.subnet=10.0.0.0/8 \
          --timeout 120s

    - name: Wait for controller and httpd
      run: |
        kubectl -n isoboot-system rollout status deployment/isoboot-controller-manager --timeout=120s
        kubectl -n isoboot-system rollout status deployment/isoboot-httpd --timeout=120s

    - name: Verify controller is running
      run: kubectl -n isoboot-system get pods

    - name: Verify CRDs installed
      run: |
        kubectl get crd bootartifacts.isoboot.github.io
        kubectl get crd bootconfigs.isoboot.github.io

    - name: Collect logs on failure
      if: failure()
      run: |
        echo "=== Pods ==="
        kubectl -n isoboot-system get pods -o wide
        echo "=== Controller logs ==="
        kubectl -n isoboot-system logs -l app.kubernetes.io/name=isoboot --all-containers --tail=50 || true
        echo "=== Events ==="
        kubectl -n isoboot-system get events --sort-by='.lastTimestamp' || true
        echo "=== Describe pod ==="
        kubectl -n isoboot-system describe pod -l app.kubernetes.io/name=isoboot || true

    - name: Clean up
      if: always()
      run: kind delete cluster --name helm-test 2>/dev/null || true
