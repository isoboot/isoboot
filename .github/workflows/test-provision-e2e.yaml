name: Provision E2E

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: provision-e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/isoboot/isoboot

jobs:
  build:
    name: Build & Push (amd64)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
    - uses: actions/checkout@v4

    - name: Read Alpine version
      run: echo "ALPINE_VERSION=$(cat .alpine-version)" >> "$GITHUB_ENV"

    - name: Generate version
      id: version
      run: echo "version=0.0.0-sha.${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push isoboot image
      uses: docker/build-push-action@v6
      with:
        context: .
        platforms: linux/amd64
        push: true
        tags: ${{ env.IMAGE }}:${{ steps.version.outputs.version }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push dnsmasq image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: Dockerfile.dnsmasq
        platforms: linux/amd64
        push: true
        build-args: ALPINE_VERSION=${{ env.ALPINE_VERSION }}
        tags: ${{ env.IMAGE }}-dnsmasq:${{ steps.version.outputs.version }}
        cache-from: type=gha,scope=dnsmasq
        cache-to: type=gha,mode=max,scope=dnsmasq

    - name: Build and push httpd image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: Dockerfile.httpd
        platforms: linux/amd64
        push: true
        tags: ${{ env.IMAGE }}-httpd:${{ steps.version.outputs.version }}
        cache-from: type=gha,scope=httpd
        cache-to: type=gha,mode=max,scope=httpd

    - name: Build and push squid image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: Dockerfile.squid
        platforms: linux/amd64
        push: true
        build-args: ALPINE_VERSION=${{ env.ALPINE_VERSION }}
        tags: ${{ env.IMAGE }}-squid:${{ steps.version.outputs.version }}
        cache-from: type=gha,scope=squid
        cache-to: type=gha,mode=max,scope=squid

    - uses: azure/setup-helm@v4

    - name: Package and push Helm chart
      env:
        VERSION: ${{ steps.version.outputs.version }}
      run: |
        sed -i "s/^version:.*/version: ${VERSION}/" charts/isoboot/Chart.yaml
        sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" charts/isoboot/Chart.yaml
        helm package charts/isoboot --destination /tmp/charts
        helm push /tmp/charts/isoboot-${VERSION}.tgz oci://${REGISTRY}/isoboot/charts

  provision-test:
    name: Provision E2E — ${{ matrix.distro }} ${{ matrix.version }}${{ matrix.name_suffix }}
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: "Rocky"
            version: "10.2"
            manifest: "rocky-10.2"
            hostname: "rocky10"
            os_id: "rocky"
            mac_hyphen: "02-00-00-ab-cd-01"
            mac_colon: "02:00:00:ab:cd:01"
            installer: "kickstart"
            kernel_filename: "vmlinuz"
            initrd_filename: "initrd.img"
            nic_device: "rtl8168"
          - distro: "Rocky"
            version: "9.7"
            manifest: "rocky-9.7"
            hostname: "rocky9"
            os_id: "rocky"
            mac_hyphen: "02-00-00-ab-cd-02"
            mac_colon: "02:00:00:ab:cd:02"
            installer: "kickstart"
            kernel_filename: "vmlinuz"
            initrd_filename: "initrd.img"
            nic_device: "rtl8168"
          - distro: "Alma"
            version: "10.2"
            manifest: "alma-10.2"
            hostname: "alma10"
            os_id: "almalinux"
            mac_hyphen: "02-00-00-ab-cd-04"
            mac_colon: "02:00:00:ab:cd:04"
            installer: "kickstart"
            kernel_filename: "vmlinuz"
            initrd_filename: "initrd.img"
            nic_device: "rtl8168"
          - distro: "Alma"
            version: "9.8"
            manifest: "alma-9.8"
            hostname: "alma9"
            os_id: "almalinux"
            mac_hyphen: "02-00-00-ab-cd-05"
            mac_colon: "02:00:00:ab:cd:05"
            installer: "kickstart"
            kernel_filename: "vmlinuz"
            initrd_filename: "initrd.img"
            nic_device: "rtl8168"
          - distro: "Debian"
            version: "13"
            manifest: "debian-13"
            hostname: "deb13nfw"
            os_id: "debian"
            mac_hyphen: "02-00-00-ab-cd-07"
            mac_colon: "02:00:00:ab:cd:07"
            installer: "preseed"
            kernel_filename: "linux"
            initrd_filename: "initrd.gz"
            nic_device: "rtl8168"
            expect_provision_failure: "true"
          - distro: "Debian"
            version: "13"
            name_suffix: " firmware"
            manifest: "debian-13"
            firmware_manifest: "debian-13-firmware"
            bootconfig: "debian-13-firmware"
            hostname: "deb13fw"
            os_id: "debian"
            mac_hyphen: "02-00-00-ab-cd-08"
            mac_colon: "02:00:00:ab:cd:08"
            installer: "preseed"
            kernel_filename: "linux"
            initrd_filename: "initrd.gz"
            nic_device: "rtl8168"
            qemu_ram: "8192"
            verify_rtl_firmware: "pass"
    steps:
    - uses: actions/checkout@v4

    - name: Read Alpine version
      run: echo "ALPINE_VERSION=$(cat .alpine-version)" >> "$GITHUB_ENV"

    # ── Network tools ──────────────────────────────────────────────
    - name: Install runtime packages
      run: sudo apt-get update -qq && sudo apt-get install -y -qq qemu-utils ovmf socat

    - name: Cache QEMU build
      id: qemu-cache
      uses: actions/cache@v4
      with:
        path: ~/qemu-cache
        key: qemu-rtl8168-${{ hashFiles('test/qemu/build-qemu.sh', 'test/qemu/rtl8168.c') }}

    - name: Restore QEMU from cache
      if: steps.qemu-cache.outputs.cache-hit == 'true'
      run: |
        sudo cp ~/qemu-cache/qemu-system-x86_64 /usr/local/bin/
        sudo mkdir -p /usr/local/share/qemu
        sudo cp -a ~/qemu-cache/share/* /usr/local/share/qemu/
        qemu-system-x86_64 --version

    - name: Build QEMU with RTL8168 device
      if: steps.qemu-cache.outputs.cache-hit != 'true'
      run: |
        ./test/qemu/build-qemu.sh
        mkdir -p ~/qemu-cache/share
        cp /usr/local/bin/qemu-system-x86_64 ~/qemu-cache/
        cp -a /usr/local/share/qemu/* ~/qemu-cache/share/

    - name: Enable KVM
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
          | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules
        sudo udevadm trigger --name-match=kvm

    # ── PXE network: host=gateway+k3s, ns1=DHCP server ────────────
    - name: Create PXE bridge
      run: |
        sudo ip link add br-pxe type bridge
        sudo ip addr add 192.168.101.1/24 dev br-pxe
        sudo ip link set br-pxe up
        sudo mkdir -p /var/run/netns

    - name: Start DHCP server container (ns1 — 192.168.101.2)
      run: |
        docker run -d --name dhcp-srv \
          --cap-add=NET_ADMIN --cap-add=NET_BIND_SERVICE \
          alpine:${{ env.ALPINE_VERSION }} sleep infinity

        docker exec dhcp-srv apk add --no-cache dnsmasq

        SRV_PID=$(docker inspect -f '{{.State.Pid}}' dhcp-srv)
        sudo ln -sf /proc/$SRV_PID/ns/net /var/run/netns/ns1

        sudo ip link add veth-ns1 type veth peer name veth-ns1-br
        sudo ip link set veth-ns1-br master br-pxe
        sudo ip link set veth-ns1-br up
        sudo ip link set veth-ns1 netns "$SRV_PID"
        sudo ip netns exec ns1 ip addr add 192.168.101.2/24 dev veth-ns1
        sudo ip netns exec ns1 ip link set veth-ns1 up
        sudo ip netns exec ns1 ip link set lo up

        docker exec -d dhcp-srv dnsmasq \
          --no-daemon \
          --interface=veth-ns1 \
          --bind-interfaces \
          --dhcp-range=192.168.101.100,192.168.101.200,255.255.255.0,1h \
          --dhcp-option=option:router,192.168.101.1 \
          --dhcp-option=option:dns-server,8.8.8.8 \
          --log-dhcp \
          --log-facility=/tmp/dnsmasq.log

        for i in 1 2 3 4 5; do
          docker exec dhcp-srv pgrep dnsmasq 2>/dev/null && break
          sleep 1
        done
        docker exec dhcp-srv pgrep dnsmasq || { echo "FAIL: dnsmasq not running"; docker logs dhcp-srv; exit 1; }
        echo "DHCP server running at 192.168.101.2 (ns1)"

    - name: Enable NAT for VM internet access
      run: |
        sudo sysctl -w net.ipv4.ip_forward=1
        sudo iptables -t nat -A POSTROUTING -s 192.168.101.0/24 ! -o br-pxe -j MASQUERADE

    # ── k3s cluster ────────────────────────────────────────────────
    - name: Create host data directory
      run: |
        sudo mkdir -p /data/isoboot
        sudo chown 65532:65532 /data/isoboot

    - name: Restore squid cache
      id: squid-cache
      uses: actions/cache/restore@v4
      with:
        path: /tmp/squid-cache
        key: squid-${{ matrix.hostname }}-
        restore-keys: squid-${{ matrix.hostname }}-

    - name: Populate squid cache from restore
      if: steps.squid-cache.outputs.cache-matched-key != ''
      run: |
        sudo mkdir -p /data/isoboot/squid/cache
        sudo tar xf /tmp/squid-cache/squid-cache.tar.gz -C /data/isoboot/squid/cache
        sudo chown -R 31:31 /data/isoboot/squid/cache
        echo "Restored squid cache ($(sudo du -sm /data/isoboot/squid/cache | awk '{print $1}')MB)"

    - name: Install k3s
      run: |
        curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="--disable=traefik" INSTALL_K3S_CHANNEL="stable" sh -
        sudo chmod 644 /etc/rancher/k3s/k3s.yaml
        echo "KUBECONFIG=/etc/rancher/k3s/k3s.yaml" >> "$GITHUB_ENV"
        export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
        kubectl wait --for=condition=Ready node --all --timeout=120s

    - name: Allow PXE bridge traffic through iptables
      run: |
        sudo iptables -I FORWARD -i br-pxe -j ACCEPT
        sudo iptables -I FORWARD -o br-pxe -j ACCEPT

    # ── Deploy isoboot from GHCR ──────────────────────────────────
    - name: Get k3s node name
      id: node
      run: echo "name=$(kubectl get nodes -o jsonpath='{.items[0].metadata.name}')" >> "$GITHUB_OUTPUT"

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - uses: azure/setup-helm@v4

    - name: Helm install from GHCR
      env:
        VERSION: ${{ needs.build.outputs.version }}
        NODE_NAME: ${{ steps.node.outputs.name }}
      run: |
        helm install isoboot oci://${REGISTRY}/isoboot/charts/isoboot \
          --version "${VERSION}" \
          --namespace isoboot-system \
          --create-namespace \
          --set nodeName="${NODE_NAME}" \
          --set dnsmasq.subnet=192.168.101.0/24 \
          --set alpineImage=alpine:${ALPINE_VERSION} \
          --set squid.log.access=true

    - name: Wait for controller and nginx
      run: |
        for label in controller nginx; do
          echo "Waiting for $label pod to exist..."
          for i in $(seq 1 30); do
            kubectl -n isoboot-system get pod -l "app.kubernetes.io/component=$label" 2>/dev/null | grep -q . && break
            sleep 2
          done
          kubectl -n isoboot-system wait --for=condition=Ready \
            pod -l "app.kubernetes.io/component=$label" --timeout=300s
        done

    - name: Wait for httpd
      run: |
        echo "Waiting for httpd pod to exist..."
        for i in $(seq 1 30); do
          kubectl -n isoboot-system get pod -l app.kubernetes.io/component=httpd 2>/dev/null | grep -q . && break
          sleep 2
        done
        kubectl -n isoboot-system wait --for=condition=Ready \
          pod -l app.kubernetes.io/component=httpd --timeout=120s
        kubectl -n isoboot-system get pods

    - name: Verify CRDs installed
      run: |
        kubectl get crd bootartifacts.isoboot.github.io
        kubectl get crd bootconfigs.isoboot.github.io
        kubectl get crd machines.isoboot.github.io
        kubectl get crd provisions.isoboot.github.io
        kubectl get crd provisionautomations.isoboot.github.io

    # ── Boot artifacts ─────────────────────────────────────────────
    - name: Wait for iPXE BootArtifact Ready
      run: ./test/e2e/wait-for-resource.sh -n isoboot-system bootartifact isoboot-ipxe

    - name: Wait for dnsmasq pod ready
      run: |
        kubectl -n isoboot-system wait --for=condition=Ready \
          pod -l app.kubernetes.io/component=dnsmasq --timeout=180s
        kubectl -n isoboot-system get pods

    - name: Apply ${{ matrix.distro }} ${{ matrix.version }} example manifest
      run: |
        kubectl -n isoboot-system apply -f examples/${{ matrix.manifest }}.yaml
        if [ -n "${{ matrix.firmware_manifest }}" ]; then
          kubectl -n isoboot-system apply -f examples/${{ matrix.firmware_manifest }}.yaml
        fi

    - name: Wait for BootArtifacts Ready
      run: |
        ./test/e2e/wait-for-resource.sh -n isoboot-system bootartifact ${{ matrix.manifest }}-kernel
        ./test/e2e/wait-for-resource.sh -n isoboot-system bootartifact ${{ matrix.manifest }}-initrd
        if [ -n "${{ matrix.firmware_manifest }}" ]; then
          ./test/e2e/wait-for-resource.sh -n isoboot-system bootartifact ${{ matrix.firmware_manifest }}
        fi

    - name: Wait for BootConfig Ready
      run: ./test/e2e/wait-for-resource.sh -n isoboot-system bootconfig ${{ matrix.bootconfig || matrix.manifest }}

    # ── Generate SSH keys and password ─────────────────────────────
    - name: Generate SSH keys and encrypted password
      run: |
        ssh-keygen -t ed25519 -N "" -f /tmp/e2e-ssh-key
        ssh-keygen -t ecdsa -N "" -f /tmp/ssh_host_ecdsa_key
        ssh-keygen -t ed25519 -N "" -f /tmp/ssh_host_ed25519_key
        ssh-keygen -t rsa -b 4096 -N "" -f /tmp/ssh_host_rsa_key
        openssl passwd -6 "e2etest" > /tmp/encrypted-password
        head -c 16 /dev/urandom | xxd -p > /tmp/machine-id

    # ── Create provisioning resources ──────────────────────────────
    - name: Create ConfigMap and Secret
      run: |
        kubectl -n isoboot-system create configmap default-user \
          --from-literal="default_user.username=isoboot" \
          --from-literal="default_user.password=$(cat /tmp/encrypted-password)" \
          --from-literal="default_user.ssh_public_key=$(cat /tmp/e2e-ssh-key.pub)" \
          --from-literal="machine_id=$(cat /tmp/machine-id)"

        kubectl -n isoboot-system create secret generic host-keys \
          --from-file=ssh_host_ecdsa_key=/tmp/ssh_host_ecdsa_key \
          --from-file=ssh_host_ed25519_key=/tmp/ssh_host_ed25519_key \
          --from-file=ssh_host_rsa_key=/tmp/ssh_host_rsa_key \
          --from-literal="ssh_host_ecdsa_key_b64=$(base64 -w0 < /tmp/ssh_host_ecdsa_key)" \
          --from-literal="ssh_host_ed25519_key_b64=$(base64 -w0 < /tmp/ssh_host_ed25519_key)" \
          --from-literal="ssh_host_rsa_key_b64=$(base64 -w0 < /tmp/ssh_host_rsa_key)"

    - name: Create Machine, ProvisionAutomation, and Provision
      if: matrix.installer == 'kickstart'
      run: |
        kubectl -n isoboot-system apply -f - <<'EOF'
        apiVersion: isoboot.github.io/v1alpha1
        kind: Machine
        metadata:
          name: qemu-vm1
        spec:
          mac: "${{ matrix.mac_hyphen }}"
        ---
        apiVersion: isoboot.github.io/v1alpha1
        kind: ProvisionAutomation
        metadata:
          name: qemu-vm1-automation
        spec:
          files:
            ks.cfg: |
              lang en_US.UTF-8
              keyboard us
              timezone America/Los_Angeles --utc
              autopart --type=plain
              clearpart --all --initlabel
              zerombr
              bootloader --location=mbr --append="console=ttyS0,115200"
              user --name={{ index .ConfigMaps "default_user.username" }} --groups=wheel --iscrypted --password={{ index .ConfigMaps "default_user.password" }}
              {{- if index .ConfigMaps "default_user.ssh_public_key" }}
              sshkey --username={{ index .ConfigMaps "default_user.username" }} "{{ index .ConfigMaps "default_user.ssh_public_key" }}"
              {{- end }}
              network --bootproto=dhcp --onboot=yes --hostname=${{ matrix.hostname }}
              eula --agreed
              reboot

              %packages
              @core
              %end

              %pre --log=/var/log/kickstart-pre.log
              curl -X POST -d "provisionName={{.ProvisionName}}&phase=InProgress" {{.UpdatePhaseURL}}
              %end

              %post --log=/var/log/kickstart-post.log
              {{- if index .Secrets "ssh_host_ecdsa_key" }}
              printf '%s' '{{ index .Secrets "ssh_host_ecdsa_key" }}' > /etc/ssh/ssh_host_ecdsa_key
              chmod 600 /etc/ssh/ssh_host_ecdsa_key
              restorecon /etc/ssh/ssh_host_ecdsa_key
              ssh-keygen -y -f /etc/ssh/ssh_host_ecdsa_key > /etc/ssh/ssh_host_ecdsa_key.pub
              chmod 644 /etc/ssh/ssh_host_ecdsa_key.pub
              restorecon /etc/ssh/ssh_host_ecdsa_key.pub
              {{- end }}
              {{- if index .Secrets "ssh_host_ed25519_key" }}
              printf '%s' '{{ index .Secrets "ssh_host_ed25519_key" }}' > /etc/ssh/ssh_host_ed25519_key
              chmod 600 /etc/ssh/ssh_host_ed25519_key
              restorecon /etc/ssh/ssh_host_ed25519_key
              ssh-keygen -y -f /etc/ssh/ssh_host_ed25519_key > /etc/ssh/ssh_host_ed25519_key.pub
              chmod 644 /etc/ssh/ssh_host_ed25519_key.pub
              restorecon /etc/ssh/ssh_host_ed25519_key.pub
              {{- end }}
              {{- if index .Secrets "ssh_host_rsa_key" }}
              printf '%s' '{{ index .Secrets "ssh_host_rsa_key" }}' > /etc/ssh/ssh_host_rsa_key
              chmod 600 /etc/ssh/ssh_host_rsa_key
              restorecon /etc/ssh/ssh_host_rsa_key
              ssh-keygen -y -f /etc/ssh/ssh_host_rsa_key > /etc/ssh/ssh_host_rsa_key.pub
              chmod 644 /etc/ssh/ssh_host_rsa_key.pub
              restorecon /etc/ssh/ssh_host_rsa_key.pub
              {{- end }}
              sed -i 's/^#\?PasswordAuthentication.*/PasswordAuthentication no/' /etc/ssh/sshd_config
              sed -i '/\/boot\/efi/s/defaults/defaults,nofail/' /etc/fstab
              {{- if index .ConfigMaps "machine_id" }}
              printf '%s\n' '{{ index .ConfigMaps "machine_id" }}' > /etc/machine-id
              chmod 444 /etc/machine-id
              restorecon /etc/machine-id
              {{- end }}
              curl -X POST -d "provisionName={{.ProvisionName}}&phase=Complete" {{.UpdatePhaseURL}}
              %end
        ---
        apiVersion: isoboot.github.io/v1alpha1
        kind: Provision
        metadata:
          name: qemu-vm1-provision
        spec:
          machineRef: qemu-vm1
          bootConfigRef: ${{ matrix.bootconfig || matrix.manifest }}
          provisionAutomationRef: qemu-vm1-automation
          configMaps:
            - default-user
          secrets:
            - host-keys
        EOF

        kubectl -n isoboot-system patch provision qemu-vm1-provision \
          --subresource=status --type=merge -p '{"status":{"phase":"Pending"}}'

    - name: Create Machine, ProvisionAutomation, and Provision (preseed)
      if: matrix.installer == 'preseed'
      run: |
        kubectl -n isoboot-system apply -f - <<'EOF'
        apiVersion: isoboot.github.io/v1alpha1
        kind: Machine
        metadata:
          name: qemu-vm1
        spec:
          mac: "${{ matrix.mac_hyphen }}"
        ---
        apiVersion: isoboot.github.io/v1alpha1
        kind: ProvisionAutomation
        metadata:
          name: qemu-vm1-automation
        spec:
          files:
            preseed.cfg: |
              d-i debian-installer/locale string en_US.UTF-8
              d-i keyboard-configuration/xkb-keymap select us
              d-i time/zone string America/Los_Angeles
              d-i clock-setup/utc boolean true
              d-i netcfg/choose_interface select auto
              d-i netcfg/get_hostname string ${{ matrix.hostname }}
              d-i netcfg/get_domain string local
              d-i mirror/country string manual
              d-i mirror/http/hostname string deb.debian.org
              d-i mirror/http/directory string /debian
              d-i passwd/root-login boolean false
              d-i passwd/user-fullname string Isoboot User
              d-i passwd/username string isoboot
              d-i passwd/user-password-crypted password {{ index .ConfigMaps "default_user.password" }}
              d-i partman-auto/method string regular
              d-i partman-auto/disk string /dev/vda
              d-i partman-auto/choose_recipe select atomic
              d-i partman-partitioning/confirm_write_new_label boolean true
              d-i partman/choose_partition select finish
              d-i partman/confirm boolean true
              d-i partman/confirm_nooverwrite boolean true
              tasksel tasksel/first multiselect standard, ssh-server
              d-i pkgsel/include string openssh-server curl
              d-i grub-installer/only_debian boolean true
              d-i grub-installer/bootdev string /dev/vda
              d-i preseed/early_command string wget -q -O /dev/null --post-data="provisionName={{.ProvisionName}}&phase=InProgress" "{{.UpdatePhaseURL}}" || true
              d-i preseed/late_command string in-target mkdir -p /home/isoboot/.ssh && echo '{{ index .ConfigMaps "default_user.ssh_public_key" }}' > /target/home/isoboot/.ssh/authorized_keys && in-target chmod 700 /home/isoboot/.ssh && chmod 600 /target/home/isoboot/.ssh/authorized_keys && in-target chown -R isoboot:isoboot /home/isoboot/.ssh && echo '{{ index .Secrets "ssh_host_ecdsa_key_b64" }}' | base64 -d > /target/etc/ssh/ssh_host_ecdsa_key && chmod 600 /target/etc/ssh/ssh_host_ecdsa_key && in-target ssh-keygen -y -f /etc/ssh/ssh_host_ecdsa_key > /target/etc/ssh/ssh_host_ecdsa_key.pub && chmod 644 /target/etc/ssh/ssh_host_ecdsa_key.pub && echo '{{ index .Secrets "ssh_host_ed25519_key_b64" }}' | base64 -d > /target/etc/ssh/ssh_host_ed25519_key && chmod 600 /target/etc/ssh/ssh_host_ed25519_key && in-target ssh-keygen -y -f /etc/ssh/ssh_host_ed25519_key > /target/etc/ssh/ssh_host_ed25519_key.pub && chmod 644 /target/etc/ssh/ssh_host_ed25519_key.pub && echo '{{ index .Secrets "ssh_host_rsa_key_b64" }}' | base64 -d > /target/etc/ssh/ssh_host_rsa_key && chmod 600 /target/etc/ssh/ssh_host_rsa_key && in-target ssh-keygen -y -f /etc/ssh/ssh_host_rsa_key > /target/etc/ssh/ssh_host_rsa_key.pub && chmod 644 /target/etc/ssh/ssh_host_rsa_key.pub && in-target sed -i 's/^#PasswordAuthentication yes/PasswordAuthentication no/' /etc/ssh/sshd_config && in-target sed -i 's/^PasswordAuthentication yes/PasswordAuthentication no/' /etc/ssh/sshd_config &&{{- if index .ConfigMaps "machine_id" }} echo '{{ index .ConfigMaps "machine_id" }}' > /target/etc/machine-id && chmod 444 /target/etc/machine-id &&{{- end }} echo '${{ matrix.hostname }}' > /target/etc/hostname && in-target sh -c 'printf "GRUB_CMDLINE_LINUX=\"console=ttyS0,115200\"\n" >> /etc/default/grub' && in-target update-grub && wget -q -O /dev/null --post-data="provisionName={{.ProvisionName}}&phase=Complete" "{{.UpdatePhaseURL}}"
              d-i finish-install/reboot_in_progress note
        ---
        apiVersion: isoboot.github.io/v1alpha1
        kind: Provision
        metadata:
          name: qemu-vm1-provision
        spec:
          machineRef: qemu-vm1
          bootConfigRef: ${{ matrix.bootconfig || matrix.manifest }}
          provisionAutomationRef: qemu-vm1-automation
          configMaps:
            - default-user
          secrets:
            - host-keys
        EOF

        kubectl -n isoboot-system patch provision qemu-vm1-provision \
          --subresource=status --type=merge -p '{"status":{"phase":"Pending"}}'

    # ── PXE boot QEMU VM ──────────────────────────────────────────
    - name: Boot QEMU VM (UEFI PXE)
      run: |
        OVMF_CODE=""
        for f in /usr/share/OVMF/OVMF_CODE_4M.fd /usr/share/OVMF/OVMF_CODE.fd; do
          [ -f "$f" ] && OVMF_CODE="$f" && break
        done
        [ -n "$OVMF_CODE" ] || { echo "FAIL: OVMF firmware not found"; exit 1; }

        OVMF_VARS_SRC=""
        for f in /usr/share/OVMF/OVMF_VARS_4M.fd /usr/share/OVMF/OVMF_VARS.fd; do
          [ -f "$f" ] && OVMF_VARS_SRC="$f" && break
        done
        [ -n "$OVMF_VARS_SRC" ] || { echo "FAIL: OVMF vars not found"; exit 1; }
        cp "$OVMF_VARS_SRC" /tmp/ovmf-vars.fd

        sudo ip tuntap add dev tap-vm mode tap
        sudo ip link set tap-vm master br-pxe
        sudo ip link set tap-vm up

        # Disable bridge-nf-call-iptables so bridged traffic between the
        # VM and host doesn't pass through k3s's FORWARD DROP chain.
        sudo sysctl -w net.bridge.bridge-nf-call-iptables=0

        qemu-img create -f qcow2 /tmp/pxe-test-disk.qcow2 20G

        sudo qemu-system-x86_64 \
          -enable-kvm \
          -m ${{ matrix.qemu_ram || '8192' }} \
          -cpu host \
          -smp 2 \
          -drive if=pflash,format=raw,readonly=on,file="$OVMF_CODE" \
          -drive if=pflash,format=raw,file=/tmp/ovmf-vars.fd \
          -drive file=/tmp/pxe-test-disk.qcow2,format=qcow2,if=none,id=disk0 \
          -device virtio-blk-pci,drive=disk0 \
          -netdev tap,id=pxe0,ifname=tap-vm,script=no,downscript=no \
          -device rtl8168,netdev=pxe0,bootindex=1,romfile=efi-rtl8168.rom,mac=${{ matrix.mac_colon }} \
          -boot n \
          -display none \
          -serial file:/tmp/qemu-serial.log \
          -monitor unix:/tmp/qemu-monitor.sock,server,nowait \
          -daemonize \
          -pidfile /tmp/qemu-pxe.pid

        sleep 1 && sudo chmod 644 /tmp/qemu-serial.log 2>/dev/null || true
        echo "QEMU VM launched (tap-vm on br-pxe, MAC=${{ matrix.mac_colon }})"

    # ── Monitor DHCP and PXE boot ──────────────────────────────────
    - name: Wait for VM DHCP lease
      timeout-minutes: 10
      run: |
        echo "Waiting for VM to get DHCP lease..."
        VM_IP=""
        for i in $(seq 1 120); do
          VM_IP=$(docker exec dhcp-srv grep -a "DHCPACK" /tmp/dnsmasq.log 2>/dev/null \
            | grep -i "${{ matrix.mac_colon }}" | tail -1 \
            | grep -oP '192\.168\.101\.\d+' | head -1)
          [ -n "$VM_IP" ] && break
          sleep 5
        done
        [ -n "$VM_IP" ] || { echo "FAIL: VM did not get DHCP lease"; exit 1; }
        echo "VM IP: $VM_IP"
        echo "$VM_IP" > /tmp/vm-ip

    - name: Verify PXE boot downloaded kernel and initrd
      run: |
        echo "Waiting for iPXE to download kernel and initrd..."
        NGINX_POD=""
        for i in $(seq 1 30); do
          NGINX_POD=$(kubectl -n isoboot-system get pod \
            -l app.kubernetes.io/component=nginx -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
          [ -n "$NGINX_POD" ] && break
          sleep 2
        done

        for i in $(seq 1 60); do
          if kubectl -n isoboot-system exec "$NGINX_POD" -- cat /var/run/access.log 2>/dev/null \
              | grep "GET /static/${{ matrix.bootconfig || matrix.manifest }}/kernel/${{ matrix.kernel_filename }}" \
              | grep '" 200 ' | grep -q 'iPXE/'; then
            echo "Kernel downloaded by iPXE"
            break
          fi
          sleep 5
        done

        kubectl -n isoboot-system exec "$NGINX_POD" -- cat /var/run/access.log \
          | grep "GET /static/${{ matrix.bootconfig || matrix.manifest }}/kernel/${{ matrix.kernel_filename }}" \
          | grep '" 200 ' | grep 'iPXE/' \
          || { echo "FAIL: no iPXE HTTP 200 for kernel download"; exit 1; }

        for i in $(seq 1 60); do
          if kubectl -n isoboot-system exec "$NGINX_POD" -- cat /var/run/access.log 2>/dev/null \
              | grep "GET /static/${{ matrix.bootconfig || matrix.manifest }}/initrd/${{ matrix.initrd_filename }}" \
              | grep '" 200 ' | grep -q 'iPXE/'; then
            echo "Initrd downloaded by iPXE"
            break
          fi
          sleep 5
        done

        kubectl -n isoboot-system exec "$NGINX_POD" -- cat /var/run/access.log \
          | grep "GET /static/${{ matrix.bootconfig || matrix.manifest }}/initrd/${{ matrix.initrd_filename }}" \
          | grep '" 200 ' | grep 'iPXE/' \
          || { echo "FAIL: no iPXE HTTP 200 for initrd download"; exit 1; }

        echo "PXE boot successfully downloaded kernel and initrd"

    # ── Wait for provisioning to complete ──────────────────────────
    - name: Wait for Provision phase InProgress
      if: matrix.expect_provision_failure != 'true'
      timeout-minutes: 20
      run: |
        echo "Waiting for Provision phase InProgress..."
        for i in $(seq 1 120); do
          PHASE=$(kubectl -n isoboot-system get provision qemu-vm1-provision \
            -o jsonpath='{.status.phase}' 2>/dev/null)
          SQUID=$(kubectl -n isoboot-system exec deploy/isoboot-squid -- tail -1 /var/log/squid/access.log 2>/dev/null || true)
          echo "  phase=$PHASE (attempt $i) squid=${SQUID:-(none)}"
          [ "$PHASE" = "InProgress" ] || [ "$PHASE" = "Complete" ] && break
          # (squid tail is logged for observability but no early exit —
          #  internal k3s health-check errors dominate the squid log)
          sleep 10
        done
        PHASE=$(kubectl -n isoboot-system get provision qemu-vm1-provision \
          -o jsonpath='{.status.phase}')
        [ "$PHASE" = "InProgress" ] || [ "$PHASE" = "Complete" ] \
          || { echo "FAIL: provision not InProgress, got $PHASE"; exit 1; }
        echo "Provision is $PHASE"

    - name: Wait for Provision phase Complete
      if: matrix.expect_provision_failure != 'true'
      timeout-minutes: 10
      run: |
        echo "Waiting for Provision phase Complete..."
        for i in $(seq 1 60); do
          PHASE=$(kubectl -n isoboot-system get provision qemu-vm1-provision \
            -o jsonpath='{.status.phase}' 2>/dev/null)
          SQUID=$(kubectl -n isoboot-system exec deploy/isoboot-squid -- tail -1 /var/log/squid/access.log 2>/dev/null || true)
          echo "  phase=$PHASE (attempt $i) squid=${SQUID:-(none)}"
          [ "$PHASE" = "Complete" ] && break
          [ "$PHASE" = "Failed" ] && { echo "FAIL: provision failed"; exit 1; }
          sleep 10
        done
        PHASE=$(kubectl -n isoboot-system get provision qemu-vm1-provision \
          -o jsonpath='{.status.phase}')
        [ "$PHASE" = "Complete" ] || { echo "FAIL: provision not Complete, got $PHASE"; exit 1; }
        echo "Provision complete!"

    - name: Verify provision does not complete (no-firmware)
      if: matrix.expect_provision_failure == 'true'
      timeout-minutes: 10
      run: |
        echo "Verifying provision does NOT reach Complete..."
        for i in $(seq 1 50); do
          PHASE=$(kubectl -n isoboot-system get provision qemu-vm1-provision \
            -o jsonpath='{.status.phase}' 2>/dev/null)
          echo "  phase=$PHASE (attempt $i)"
          [ "$PHASE" = "Complete" ] && { echo "FAIL: provision reached Complete unexpectedly"; exit 1; }
          sleep 10
        done
        echo "PASS: provision did not reach Complete"

        # Dump console so we can see what the installer is showing
        echo "=== Console dump (provision did not complete) ==="
        if [ -S /tmp/qemu-monitor.sock ]; then
          echo "screendump /tmp/qemu-no-provision.ppm" \
            | sudo socat - UNIX-CONNECT:/tmp/qemu-monitor.sock 2>/dev/null || true
          sleep 1
          sudo chmod 644 /tmp/qemu-no-provision.ppm 2>/dev/null || true
        fi
        echo "--- serial log tail ---"
        tail -50 /tmp/qemu-serial.log 2>/dev/null || true

    # ── Reboot VM from disk ──────────────────────────────────────
    - name: Restart QEMU and wait for SSH (up to 5 attempts)
      if: matrix.expect_provision_failure != 'true'
      run: |
        SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/tmp/e2e-known-hosts"
        MAC="${{ matrix.mac_colon }}"
        MAX_ATTEMPTS=5
        VM_IP=""

        # Locate OVMF firmware once
        OVMF_CODE=""
        for f in /usr/share/OVMF/OVMF_CODE_4M.fd /usr/share/OVMF/OVMF_CODE.fd; do
          [ -f "$f" ] && OVMF_CODE="$f" && break
        done

        for attempt in $(seq 1 $MAX_ATTEMPTS); do
          echo "=== Disk boot attempt $attempt/$MAX_ATTEMPTS ==="

          # ── Kill previous QEMU ──
          if [ -S /tmp/qemu-monitor.sock ]; then
            echo "quit" | sudo socat - UNIX-CONNECT:/tmp/qemu-monitor.sock 2>/dev/null || true
            for w in $(seq 1 10); do
              [ -f /tmp/qemu-pxe.pid ] && kill -0 "$(sudo cat /tmp/qemu-pxe.pid)" 2>/dev/null || break
              sleep 1
            done
          fi
          [ -f /tmp/qemu-pxe.pid ] && sudo kill "$(sudo cat /tmp/qemu-pxe.pid)" 2>/dev/null || true
          sudo rm -f /tmp/qemu-monitor.sock /tmp/qemu-pxe.pid

          # ── Re-attach tap ──
          sudo ip link set tap-vm master br-pxe 2>/dev/null || true
          sudo ip link set tap-vm up

          # ── Start QEMU ──
          sudo qemu-system-x86_64 \
            -enable-kvm \
            -m ${{ matrix.qemu_ram || '8192' }} \
            -cpu host \
            -smp 2 \
            -drive if=pflash,format=raw,readonly=on,file="$OVMF_CODE" \
            -drive if=pflash,format=raw,file=/tmp/ovmf-vars.fd \
            -drive file=/tmp/pxe-test-disk.qcow2,format=qcow2,if=none,id=disk0 \
            -device virtio-blk-pci,drive=disk0,bootindex=1 \
            -netdev tap,id=pxe0,ifname=tap-vm,script=no,downscript=no \
            -device rtl8168,netdev=pxe0,romfile=efi-rtl8168.rom,mac=${{ matrix.mac_colon }} \
            -display none \
            -serial file:/tmp/qemu-serial-boot.log \
            -monitor unix:/tmp/qemu-monitor.sock,server,nowait \
            -daemonize \
            -pidfile /tmp/qemu-pxe.pid

          sudo chmod 644 /tmp/qemu-serial-boot.log 2>/dev/null || true

          # Give the OS time to boot, load r8169 firmware, and get DHCP
          echo "Waiting 30s for OS boot + firmware gate..."
          sleep 30

          # ── Find VM IP: check DHCP log + sweep ±3 neighbours ──
          FOUND=false
          for tick in $(seq 1 36); do  # 36 × 5s = 3 minutes
            # 1) Check DHCP log for latest ACK with our MAC
            VM_IP=$(docker exec dhcp-srv grep -a "DHCPACK" /tmp/dnsmasq.log 2>/dev/null \
              | grep -i "$MAC" | tail -1 \
              | grep -oP '192\.168\.101\.\d+' | head -1)

            if [ -n "$VM_IP" ]; then
              # Try the DHCP-assigned IP first
              if ping -c1 -W1 "$VM_IP" >/dev/null 2>&1; then
                echo "Ping OK: $VM_IP (from DHCP log)"
                FOUND=true && break
              fi
              # Sweep ±3 neighbours in case DHCP gave a different lease
              LAST_OCTET=$(echo "$VM_IP" | grep -oP '\d+$')
              for offset in -3 -2 -1 1 2 3; do
                SWEEP_IP="192.168.101.$((LAST_OCTET + offset))"
                if ping -c1 -W1 "$SWEEP_IP" >/dev/null 2>&1; then
                  echo "Ping OK: $SWEEP_IP (sweep from $VM_IP)"
                  VM_IP="$SWEEP_IP"
                  FOUND=true && break 2
                fi
              done
            fi
            sleep 5
          done

          # ── Try SSH if ping succeeded ──
          if $FOUND; then
            if ssh -i /tmp/e2e-ssh-key $SSH_OPTS \
                -o ConnectTimeout=10 -o BatchMode=yes \
                isoboot@"$VM_IP" true 2>/dev/null; then
              echo "SSH OK on attempt $attempt (IP: $VM_IP)"
              echo "$VM_IP" > /tmp/vm-ip
              break
            fi
            echo "Ping OK but SSH failed on $VM_IP"
          fi

          # ── Dump console on failure ──
          echo "=== Attempt $attempt failed — dumping console ==="
          if [ -S /tmp/qemu-monitor.sock ]; then
            echo "screendump /tmp/qemu-retry-$attempt.ppm" \
              | sudo socat - UNIX-CONNECT:/tmp/qemu-monitor.sock 2>/dev/null || true
            sleep 1
            sudo chmod 644 /tmp/qemu-retry-$attempt.ppm 2>/dev/null || true
          fi
          echo "--- serial log tail ---"
          tail -30 /tmp/qemu-serial-boot.log 2>/dev/null || true
          echo "--- DHCP log ---"
          docker exec dhcp-srv grep -ai "$MAC" /tmp/dnsmasq.log 2>/dev/null | tail -5 || true
          echo "========================"

          if [ "$attempt" -eq "$MAX_ATTEMPTS" ]; then
            echo "FAIL: VM not reachable after $MAX_ATTEMPTS attempts"
            exit 1
          fi
        done
        echo "Using VM IP: $VM_IP"

        # (a) Verify SSH key login works
        ssh -i /tmp/e2e-ssh-key $SSH_OPTS isoboot@"$VM_IP" true \
          || { echo "FAIL: SSH key login failed"; exit 1; }
        echo "PASS: SSH key login"

        # (b) Verify password login is blocked
        ssh $SSH_OPTS \
          -o BatchMode=no \
          -o PasswordAuthentication=yes \
          -o PubkeyAuthentication=no \
          -o KbdInteractiveAuthentication=no \
          -o NumberOfPasswordPrompts=0 \
          isoboot@"$VM_IP" true 2>/dev/null \
          && { echo "FAIL: password login should be blocked but succeeded"; exit 1; } \
          || echo "PASS: password login blocked"

        # (c) Verify hostname
        ACTUAL_HOSTNAME=$(ssh -i /tmp/e2e-ssh-key $SSH_OPTS isoboot@"$VM_IP" hostname)
        echo "VM hostname: $ACTUAL_HOSTNAME"
        [ "$ACTUAL_HOSTNAME" = "${{ matrix.hostname }}" ] \
          || { echo "FAIL: expected ${{ matrix.hostname }}, got $ACTUAL_HOSTNAME"; exit 1; }
        echo "PASS: hostname"

        # (d) Verify all 3 SSH host key fingerprints
        EXPECTED_ECDSA=$(ssh-keygen -lf /tmp/ssh_host_ecdsa_key.pub | awk '{print $2}')
        ACTUAL_ECDSA=$(ssh-keyscan -t ecdsa "$VM_IP" 2>/dev/null | ssh-keygen -lf - | awk '{print $2}')
        echo "ecdsa: expected=$EXPECTED_ECDSA actual=$ACTUAL_ECDSA"
        [ "$EXPECTED_ECDSA" = "$ACTUAL_ECDSA" ] \
          || { echo "FAIL: ecdsa fingerprint mismatch"; exit 1; }

        EXPECTED_ED25519=$(ssh-keygen -lf /tmp/ssh_host_ed25519_key.pub | awk '{print $2}')
        ACTUAL_ED25519=$(ssh-keyscan -t ed25519 "$VM_IP" 2>/dev/null | ssh-keygen -lf - | awk '{print $2}')
        echo "ed25519: expected=$EXPECTED_ED25519 actual=$ACTUAL_ED25519"
        [ "$EXPECTED_ED25519" = "$ACTUAL_ED25519" ] \
          || { echo "FAIL: ed25519 fingerprint mismatch"; exit 1; }

        EXPECTED_RSA=$(ssh-keygen -lf /tmp/ssh_host_rsa_key.pub | awk '{print $2}')
        ACTUAL_RSA=$(ssh-keyscan -t rsa "$VM_IP" 2>/dev/null | ssh-keygen -lf - | awk '{print $2}')
        echo "rsa: expected=$EXPECTED_RSA actual=$ACTUAL_RSA"
        [ "$EXPECTED_RSA" = "$ACTUAL_RSA" ] \
          || { echo "FAIL: rsa fingerprint mismatch"; exit 1; }
        echo "PASS: all host key fingerprints"

        # (e) Verify OS from /etc/os-release
        OS_ID=$(ssh -i /tmp/e2e-ssh-key $SSH_OPTS isoboot@"$VM_IP" \
          'source /etc/os-release && echo $ID')
        OS_VERSION=$(ssh -i /tmp/e2e-ssh-key $SSH_OPTS isoboot@"$VM_IP" \
          'source /etc/os-release && echo $VERSION_ID')
        echo "OS: ID=$OS_ID VERSION_ID=$OS_VERSION"
        [ "$OS_ID" = "${{ matrix.os_id }}" ] \
          || { echo "FAIL: expected OS ID ${{ matrix.os_id }}, got $OS_ID"; exit 1; }
        [ "$OS_VERSION" = "${{ matrix.version }}" ] \
          || { echo "FAIL: expected version ${{ matrix.version }}, got $OS_VERSION"; exit 1; }
        echo "PASS: OS identity"

        # (f) Verify /etc/machine-id matches generated value
        EXPECTED_MID=$(cat /tmp/machine-id)
        MID_INFO=$(ssh -i /tmp/e2e-ssh-key $SSH_OPTS isoboot@"$VM_IP" \
          'printf "%s %s" "$(head -c 32 /etc/machine-id)" "$(wc -c < /etc/machine-id)"')
        ACTUAL_MID=${MID_INFO% *}
        MID_LEN=${MID_INFO#* }
        echo "machine-id: expected=$EXPECTED_MID actual=$ACTUAL_MID len=$MID_LEN"
        [ "$EXPECTED_MID" = "$ACTUAL_MID" ] \
          || { echo "FAIL: machine-id mismatch"; exit 1; }
        [ "$MID_LEN" = "33" ] \
          || { echo "FAIL: /etc/machine-id should be 33 bytes (32 hex + newline), got $MID_LEN"; exit 1; }
        echo "PASS: machine-id"

        # (g) Verify OS is installed on virtio disk (/dev/vda)
        ROOT_DEV=$(ssh -i /tmp/e2e-ssh-key $SSH_OPTS isoboot@"$VM_IP" \
          "findmnt -n -o SOURCE /")
        echo "Root device: $ROOT_DEV"
        echo "$ROOT_DEV" | grep -q "^/dev/vda" \
          || { echo "FAIL: root not on virtio disk, got $ROOT_DEV"; exit 1; }
        echo "PASS: OS on virtio /dev/vda"

        # (h) Verify r8169 firmware status (rtl8168 tests only)
        if [ "${{ matrix.verify_rtl_firmware }}" = "pass" ]; then
          # Verify RTL8168 device was detected by the r8169 driver
          RTL_LOG=$(grep -iE 'r8169|rtl8168|rtl_nic' /tmp/qemu-serial-boot.log 2>/dev/null \
            || grep -iE 'r8169|rtl8168|rtl_nic' /tmp/qemu-serial.log 2>/dev/null || true)
          echo "r8169 serial log: $RTL_LOG"
          echo "$RTL_LOG" | grep -qi "r8169" \
            || { echo "FAIL: r8169 driver did not detect RTL8168 device"; exit 1; }
          echo "PASS: r8169 detected RTL8168 device"
        fi

        echo "All SSH verifications passed!"

    # ── Failure diagnostics ────────────────────────────────────────
    - name: Capture QEMU screenshot
      if: always()
      shell: bash {0}
      run: |
        if [ -S /tmp/qemu-monitor.sock ]; then
          echo "screendump /tmp/qemu-screenshot.ppm" | sudo socat - UNIX-CONNECT:/tmp/qemu-monitor.sock
          sleep 2
          sudo chmod 644 /tmp/qemu-screenshot.ppm 2>/dev/null
          if [ -f /tmp/qemu-screenshot.ppm ]; then
            echo "=== QEMU screenshot captured ==="
            ls -la /tmp/qemu-screenshot.ppm
          else
            echo "WARN: screendump did not produce a file"
          fi
        else
          echo "WARN: QEMU monitor socket not found"
        fi

    - name: Upload QEMU screenshots
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: qemu-screenshot-${{ matrix.hostname }}
        path: /tmp/qemu-*.ppm
        if-no-files-found: ignore

    - name: Collect logs on failure
      if: failure()
      run: |
        echo "=== Bridge ==="
        ip addr show br-pxe 2>/dev/null || true
        bridge link show master br-pxe 2>/dev/null || true
        echo "=== DHCP server (ns1) ==="
        sudo ip netns exec ns1 ip addr 2>/dev/null || true
        echo "=== dnsmasq DHCP logs ==="
        docker exec dhcp-srv cat /tmp/dnsmasq.log 2>/dev/null || true
        echo "=== dnsmasq container logs ==="
        docker logs dhcp-srv 2>/dev/null || true
        echo "=== QEMU serial log (PXE boot) ==="
        cat /tmp/qemu-serial.log 2>/dev/null || true
        echo "=== QEMU serial log (disk boot) ==="
        cat /tmp/qemu-serial-boot.log 2>/dev/null || true
        echo "=== BootArtifact status ==="
        kubectl -n isoboot-system get bootartifact -o yaml 2>/dev/null || true
        echo "=== BootConfig status ==="
        kubectl -n isoboot-system get bootconfig -o yaml 2>/dev/null || true
        echo "=== Provision status ==="
        kubectl -n isoboot-system get provision -o yaml 2>/dev/null || true
        echo "=== ProvisionAutomation status ==="
        kubectl -n isoboot-system get provisionautomation -o yaml 2>/dev/null || true
        echo "=== ConfigMap ==="
        kubectl -n isoboot-system get configmap default-user -o yaml 2>/dev/null || true
        echo "=== Controller logs ==="
        kubectl -n isoboot-system logs -l app.kubernetes.io/name=isoboot --tail=100 2>/dev/null || true
        echo "=== httpd logs ==="
        kubectl -n isoboot-system logs -l app.kubernetes.io/component=httpd --tail=50 2>/dev/null || true
        echo "=== Nginx logs ==="
        kubectl -n isoboot-system logs -l app.kubernetes.io/component=nginx --tail=50 2>/dev/null || true
        echo "=== Nginx resolve-dns init container logs ==="
        kubectl -n isoboot-system logs -l app.kubernetes.io/component=nginx -c resolve-dns --tail=50 2>/dev/null || true
        echo "=== Nginx access log ==="
        NGINX_POD=$(kubectl -n isoboot-system get pod -l app.kubernetes.io/component=nginx \
          -o jsonpath='{.items[0].metadata.name}' 2>/dev/null) || true
        [ -n "$NGINX_POD" ] && kubectl -n isoboot-system exec "$NGINX_POD" -- cat /var/run/access.log 2>/dev/null || true
        echo "=== dnsmasq pod logs ==="
        kubectl -n isoboot-system logs -l app.kubernetes.io/component=dnsmasq --tail=100 2>/dev/null || true
        echo "=== dnsmasq generate-boot-ipxe init container logs ==="
        kubectl -n isoboot-system logs -l app.kubernetes.io/component=dnsmasq -c generate-boot-ipxe --tail=50 2>/dev/null || true
        echo "=== Events ==="
        kubectl -n isoboot-system get events --sort-by='.lastTimestamp' 2>/dev/null || true
        echo "=== Host data directory ==="
        find /data/isoboot -type f -o -type l 2>/dev/null || true
        echo "=== Describe pods ==="
        kubectl -n isoboot-system describe pod -l app.kubernetes.io/name=isoboot 2>/dev/null || true

    - name: Save squid cache
      if: always()
      shell: bash {0}
      run: |
        SQUID_POD=$(kubectl -n isoboot-system get pod \
          -l app.kubernetes.io/component=squid \
          -o jsonpath='{.items[0].metadata.name}' 2>/dev/null) || true

        SAVE_CACHE=true

        # If we had a cache hit, check miss rate
        if [ -n "${{ steps.squid-cache.outputs.cache-matched-key }}" ] && [ -n "$SQUID_POD" ]; then
          TOTAL=$(kubectl -n isoboot-system exec "$SQUID_POD" -- \
            cat /var/log/squid/access.log 2>/dev/null | wc -l || echo 0)
          MISSES=$(kubectl -n isoboot-system exec "$SQUID_POD" -- \
            cat /var/log/squid/access.log 2>/dev/null | grep -c "TCP_MISS" || echo 0)
          if [ "$TOTAL" -gt 0 ]; then
            MISS_RATE=$((MISSES * 100 / TOTAL))
            echo "Squid stats: ${MISSES}/${TOTAL} misses (${MISS_RATE}%)"
            if [ "$MISS_RATE" -gt 25 ]; then
              echo "Miss rate ${MISS_RATE}% > 25% — skipping cache save to invalidate"
              SAVE_CACHE=false
            fi
          fi
        fi

        if [ "$SAVE_CACHE" = "true" ] && [ -d /data/isoboot/squid/cache ]; then
          sudo rm -rf /tmp/squid-cache
          mkdir -p /tmp/squid-cache
          sudo tar czf /tmp/squid-cache/squid-cache.tar.gz -C /data/isoboot/squid/cache .
          echo "Saved squid cache ($(du -sm /tmp/squid-cache/squid-cache.tar.gz | awk '{print $1}')MB)"
        fi

    - name: Upload squid cache
      if: always()
      uses: actions/cache/save@v4
      with:
        path: /tmp/squid-cache
        key: squid-${{ matrix.hostname }}-${{ github.run_id }}

    - name: Clean up
      if: always()
      run: |
        [ -f /tmp/qemu-pxe.pid ] && sudo kill "$(sudo cat /tmp/qemu-pxe.pid)" 2>/dev/null || true
        sudo ip link del tap-vm 2>/dev/null || true
        /usr/local/bin/k3s-uninstall.sh 2>/dev/null || true
        docker rm -f dhcp-srv 2>/dev/null || true
        sudo rm -f /var/run/netns/ns1
        sudo ip link del br-pxe 2>/dev/null || true
