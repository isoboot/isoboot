name: Tag Release & E2E Test

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.0.1-rc1)"
        required: true

permissions:
  contents: read
  packages: write

concurrency:
  group: tag-release-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/isoboot/isoboot
  KIND_VERSION: v0.31.0
  # Rocky Linux 10.1 — SHA-256 digests from .treeinfo
  VMLINUZ_SHA256: "242531e62b1170f3306a6b903033f44ae7cf68f2a610142bdb5281249a1e6607"
  VMLINUZ_URL: "https://dl.rockylinux.org/pub/rocky/10.1/BaseOS/x86_64/os/images/pxeboot/vmlinuz"
  INITRD_SHA256: "07ec303514509b4ddbfe8df90f65dddaf48519f25b416a2a5368903fe39c627a"
  INITRD_URL: "https://dl.rockylinux.org/pub/rocky/10.1/BaseOS/x86_64/os/images/pxeboot/initrd.img"

jobs:
  release-and-test:
    name: Release & E2E DHCP + Kind + Rocky 10.1
    # isc-dhcp-client may be removed from future ubuntu-latest — accepted risk.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@v4

    - name: Parse version
      id: version
      env:
        INPUT_VERSION: ${{ inputs.version }}
      run: |
        if [ -n "$INPUT_VERSION" ]; then
          echo "version=$INPUT_VERSION" >> "$GITHUB_OUTPUT"
        else
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
        fi

    # ── Build & push to GHCR ────────────────────────────────────────
    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push multi-arch image
      uses: docker/build-push-action@v6
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: |
          ${{ env.IMAGE }}:${{ steps.version.outputs.version }}
          ${{ !contains(steps.version.outputs.version, '-') && format('{0}:latest', env.IMAGE) || '' }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push dnsmasq image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: Dockerfile.dnsmasq
        platforms: linux/amd64,linux/arm64
        push: true
        tags: |
          ${{ env.IMAGE }}-dnsmasq:${{ steps.version.outputs.version }}
          ${{ !contains(steps.version.outputs.version, '-') && format('{0}-dnsmasq:latest', env.IMAGE) || '' }}
        cache-from: type=gha,scope=dnsmasq
        cache-to: type=gha,mode=max,scope=dnsmasq

    - uses: azure/setup-helm@v4

    - name: Package and push Helm chart
      env:
        VERSION: ${{ steps.version.outputs.version }}
      run: |
        sed -i "s/^version:.*/version: ${VERSION}/" charts/isoboot/Chart.yaml
        sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" charts/isoboot/Chart.yaml
        helm package charts/isoboot --destination /tmp/charts
        helm push /tmp/charts/isoboot-${VERSION}.tgz oci://${REGISTRY}/isoboot/charts

    # ── PXE network: ns1=DHCP server, ns2=Kind node, ns3=wget client ──
    - name: Install network tools
      run: sudo apt-get update -qq && sudo apt-get install -y -qq isc-dhcp-client

    - name: Install kind
      run: |
        curl -Lo ./kind https://kind.sigs.k8s.io/dl/${{ env.KIND_VERSION }}/kind-linux-amd64
        chmod +x ./kind && sudo mv ./kind /usr/local/bin/kind

    - name: Create PXE bridge
      run: |
        sudo ip link add br-pxe type bridge
        sudo ip link set br-pxe up
        sudo mkdir -p /var/run/netns

    - name: Pull dnsmasq image for E2E
      env:
        VERSION: ${{ steps.version.outputs.version }}
      run: docker pull ${{ env.IMAGE }}-dnsmasq:${VERSION}

    - name: Start DHCP server container (ns1 — 192.168.101.1)
      env:
        VERSION: ${{ steps.version.outputs.version }}
      run: |
        docker run -d --name dhcp-srv --network=none \
          --cap-add=NET_ADMIN --cap-add=NET_BIND_SERVICE \
          --entrypoint sleep \
          ${{ env.IMAGE }}-dnsmasq:${VERSION} infinity

        # Link container netns so ip-netns can manage it
        SRV_PID=$(docker inspect -f '{{.State.Pid}}' dhcp-srv)
        sudo ln -sf /proc/$SRV_PID/ns/net /var/run/netns/ns1

        # Attach to bridge with static IP 192.168.101.1/24
        sudo ip link add veth-ns1 type veth peer name veth-ns1-br
        sudo ip link set veth-ns1-br master br-pxe
        sudo ip link set veth-ns1-br up
        sudo ip link set veth-ns1 netns "$SRV_PID"
        sudo ip netns exec ns1 ip addr add 192.168.101.1/24 dev veth-ns1
        sudo ip netns exec ns1 ip link set veth-ns1 up
        sudo ip netns exec ns1 ip link set lo up

        # Start dnsmasq inside the container
        docker exec -d dhcp-srv dnsmasq \
          --no-daemon \
          --interface=veth-ns1 \
          --bind-interfaces \
          --dhcp-range=192.168.101.100,192.168.101.200,255.255.255.0,1h \
          --dhcp-option=option:router,192.168.101.1 \
          --log-dhcp \
          --log-facility=/tmp/dnsmasq.log

        # Wait for dnsmasq to be ready
        for i in 1 2 3 4 5; do
          docker exec dhcp-srv pgrep dnsmasq 2>/dev/null && break
          sleep 1
        done
        docker exec dhcp-srv pgrep dnsmasq || { echo "FAIL: dnsmasq not running"; docker logs dhcp-srv; exit 1; }
        echo "DHCP server running at 192.168.101.1 (ns1)"

    # ── Kind cluster ─────────────────────────────────────────────────
    - name: Create host data directory
      run: |
        sudo mkdir -p /tmp/isoboot-data
        sudo chown 65532:65532 /tmp/isoboot-data

    - name: Create Kind cluster
      run: |
        cat <<EOF | kind create cluster --name pxe-test --config=-
        kind: Cluster
        apiVersion: kind.x-k8s.io/v1alpha4
        nodes:
        - role: control-plane
          extraMounts:
          - hostPath: /tmp/isoboot-data
            containerPath: /data/isoboot
        EOF

    - name: Connect Kind node to PXE bridge (ns2 — DHCP client)
      run: |
        KIND_CONTAINER=$(docker ps -qf "name=pxe-test-control-plane")
        KIND_PID=$(docker inspect -f '{{.State.Pid}}' "$KIND_CONTAINER")

        # Link Kind container netns so ip-netns can manage it
        sudo mkdir -p /var/run/netns
        sudo ln -sf /proc/$KIND_PID/ns/net /var/run/netns/ns2

        # Attach veth to bridge
        sudo ip link add veth-ns2 type veth peer name veth-ns2-br
        sudo ip link set veth-ns2-br master br-pxe
        sudo ip link set veth-ns2-br up
        sudo ip link set veth-ns2 netns "$KIND_PID"
        sudo ip netns exec ns2 ip link set veth-ns2 up

        # Get DHCP lease from dnsmasq
        sudo ip netns exec ns2 dhclient -v veth-ns2

        # Show and capture assigned IP
        sudo ip netns exec ns2 ip addr show veth-ns2
        KIND_PXE_IP=$(sudo ip netns exec ns2 ip -4 -o addr show veth-ns2 | grep -oP '192\.168\.101\.\d+' | head -1)
        [ -n "$KIND_PXE_IP" ] || { echo "FAIL: dhclient did not obtain a 192.168.101.x lease"; exit 1; }
        echo "Kind node got DHCP IP: $KIND_PXE_IP (ns2)"
        echo "$KIND_PXE_IP" > /tmp/kind-pxe-ip

        # Verify bidirectional connectivity (ns2 <-> ns1)
        sudo ip netns exec ns2 ping -c 3 192.168.101.1
        sudo ip netns exec ns1 ping -c 3 "$KIND_PXE_IP"
        echo "PXE network OK: ns1(.1) <-> ns2($KIND_PXE_IP)"

    # ── Deploy isoboot from GHCR ─────────────────────────────────────
    - name: Get Kind node name
      id: node
      run: echo "name=$(kubectl get nodes -o jsonpath='{.items[0].metadata.name}')" >> "$GITHUB_OUTPUT"

    - name: Helm install from GHCR
      env:
        VERSION: ${{ steps.version.outputs.version }}
        NODE_NAME: ${{ steps.node.outputs.name }}
      run: |
        helm install isoboot oci://${REGISTRY}/isoboot/charts/isoboot \
          --version "${VERSION}" \
          --namespace isoboot-system \
          --create-namespace \
          --set nodeName="${NODE_NAME}" \
          --wait \
          --timeout 120s

    - name: Verify controller and nginx are running
      run: |
        kubectl -n isoboot-system wait --for=condition=Ready pod -l app.kubernetes.io/name=isoboot --timeout=60s
        kubectl -n isoboot-system get pods

    - name: Verify CRDs installed
      run: |
        kubectl get crd bootartifacts.isoboot.github.io
        kubectl get crd bootconfigs.isoboot.github.io

    # ── Rocky Linux 10.1 boot artifacts ──────────────────────────────
    - name: Create BootArtifacts for Rocky Linux 10.1
      run: |
        kubectl apply -f - <<EOF
        apiVersion: isoboot.github.io/v1alpha1
        kind: BootArtifact
        metadata:
          name: rocky-10.1-vmlinuz
        spec:
          url: "${{ env.VMLINUZ_URL }}"
          sha256: "${{ env.VMLINUZ_SHA256 }}"
        ---
        apiVersion: isoboot.github.io/v1alpha1
        kind: BootArtifact
        metadata:
          name: rocky-10.1-initrd
        spec:
          url: "${{ env.INITRD_URL }}"
          sha256: "${{ env.INITRD_SHA256 }}"
        EOF

    - name: Wait for BootArtifacts Ready
      run: |
        ./test/e2e/wait-for-bootartifact.sh rocky-10.1-vmlinuz
        ./test/e2e/wait-for-bootartifact.sh rocky-10.1-initrd

    - name: Verify artifact SHA-256 on host disk
      run: |
        echo "${{ env.VMLINUZ_SHA256 }}  /tmp/isoboot-data/artifacts/rocky-10.1-vmlinuz/vmlinuz" | sha256sum -c
        echo "${{ env.INITRD_SHA256 }}  /tmp/isoboot-data/artifacts/rocky-10.1-initrd/initrd.img" | sha256sum -c

    - name: Create BootConfig for Rocky Linux 10.1
      run: |
        kubectl apply -f - <<EOF
        apiVersion: isoboot.github.io/v1alpha1
        kind: BootConfig
        metadata:
          name: rocky-linux-10.1
        spec:
          kernelRef: rocky-10.1-vmlinuz
          initrdRef: rocky-10.1-initrd
        EOF

    - name: Wait for BootConfig Ready
      run: ./test/e2e/wait-for-bootconfig.sh rocky-linux-10.1

    - name: Verify BootConfig symlinks on host disk
      run: |
        # Verify kernel symlink
        target=$(readlink /tmp/isoboot-data/boot/rocky-linux-10.1/kernel/vmlinuz)
        echo "kernel symlink target: $target"
        [ "$target" = "../../../artifacts/rocky-10.1-vmlinuz/vmlinuz" ] || { echo "FAIL: wrong kernel target"; exit 1; }

        # Verify initrd symlink
        target=$(readlink /tmp/isoboot-data/boot/rocky-linux-10.1/initrd/initrd.img)
        echo "initrd symlink target: $target"
        [ "$target" = "../../../artifacts/rocky-10.1-initrd/initrd.img" ] || { echo "FAIL: wrong initrd target"; exit 1; }

        # Verify symlinks resolve to actual files
        test -f /tmp/isoboot-data/boot/rocky-linux-10.1/kernel/vmlinuz || { echo "FAIL: kernel doesn't resolve"; exit 1; }
        test -f /tmp/isoboot-data/boot/rocky-linux-10.1/initrd/initrd.img || { echo "FAIL: initrd doesn't resolve"; exit 1; }

    # ── PXE download test: ns3 wget client ─────────────────────────
    - name: Start wget client container (ns3)
      run: |
        docker run -d --name wget-client --network=none --cap-add=NET_ADMIN \
          alpine:3.23 sh -c "sleep infinity"

        CLIENT_PID=$(docker inspect -f '{{.State.Pid}}' wget-client)
        sudo ln -sf /proc/$CLIENT_PID/ns/net /var/run/netns/ns3

        sudo ip link add veth-ns3 type veth peer name veth-ns3-br
        sudo ip link set veth-ns3-br master br-pxe
        sudo ip link set veth-ns3-br up
        sudo ip link set veth-ns3 netns "$CLIENT_PID"
        sudo ip netns exec ns3 ip link set veth-ns3 up
        sudo ip netns exec ns3 ip link set lo up

        # Get DHCP lease
        sudo ip netns exec ns3 dhclient -v veth-ns3
        sudo ip netns exec ns3 ip addr show veth-ns3
        echo "wget client ready (ns3)"

    - name: Download boot artifacts via PXE network (ns3 -> nginx on ns2)
      run: |
        KIND_PXE_IP=$(cat /tmp/kind-pxe-ip)
        docker exec wget-client wget -O /tmp/dl-vmlinuz \
          "http://${KIND_PXE_IP}:8080/static/rocky-linux-10.1/kernel/vmlinuz"
        docker exec wget-client wget -O /tmp/dl-initrd \
          "http://${KIND_PXE_IP}:8080/static/rocky-linux-10.1/initrd/initrd.img"

    - name: Verify downloaded artifact checksums
      run: |
        docker exec wget-client sh -c \
          "echo '${VMLINUZ_SHA256}  /tmp/dl-vmlinuz' | sha256sum -c"
        docker exec wget-client sh -c \
          "echo '${INITRD_SHA256}  /tmp/dl-initrd' | sha256sum -c"

    # ── Final PXE network check ──────────────────────────────────────
    - name: Verify PXE network connectivity
      run: |
        KIND_PXE_IP=$(cat /tmp/kind-pxe-ip)
        sudo ip netns exec ns1 ping -c 3 "$KIND_PXE_IP"
        sudo ip netns exec ns2 ping -c 3 192.168.101.1
        sudo ip netns exec ns3 ping -c 3 192.168.101.1
        echo "PXE network fully operational (ns1, ns2, ns3)"

    # ── Failure diagnostics ──────────────────────────────────────────
    - name: Collect logs on failure
      if: failure()
      run: |
        echo "=== Bridge ==="
        ip addr show br-pxe 2>/dev/null || true
        bridge link show master br-pxe 2>/dev/null || true
        echo "=== DHCP server (ns1) ==="
        sudo ip netns exec ns1 ip addr 2>/dev/null || true
        echo "=== Kind node (ns2) ==="
        sudo ip netns exec ns2 ip addr 2>/dev/null || true
        echo "=== wget client (ns3) ==="
        sudo ip netns exec ns3 ip addr 2>/dev/null || true
        echo "=== dnsmasq DHCP logs ==="
        docker exec dhcp-srv cat /tmp/dnsmasq.log 2>/dev/null || true
        echo "=== dnsmasq container logs ==="
        docker logs dhcp-srv 2>/dev/null || true
        echo "=== BootArtifact status ==="
        kubectl get bootartifact -o yaml 2>/dev/null || true
        echo "=== BootConfig status ==="
        kubectl get bootconfig -o yaml 2>/dev/null || true
        echo "=== Controller logs ==="
        kubectl -n isoboot-system logs -l app.kubernetes.io/name=isoboot --tail=100 2>/dev/null || true
        echo "=== Nginx logs ==="
        kubectl -n isoboot-system logs -l app.kubernetes.io/component=nginx --tail=50 2>/dev/null || true
        echo "=== Events ==="
        kubectl -n isoboot-system get events --sort-by='.lastTimestamp' 2>/dev/null || true
        echo "=== Host data directory ==="
        find /tmp/isoboot-data -type f -o -type l 2>/dev/null || true
        echo "=== Describe pods ==="
        kubectl -n isoboot-system describe pod -l app.kubernetes.io/name=isoboot 2>/dev/null || true

    - name: Clean up
      if: always()
      run: |
        kind delete cluster --name pxe-test 2>/dev/null || true
        docker rm -f dhcp-srv wget-client 2>/dev/null || true
        sudo rm -f /var/run/netns/ns1 /var/run/netns/ns2 /var/run/netns/ns3
        sudo ip link del br-pxe 2>/dev/null || true
