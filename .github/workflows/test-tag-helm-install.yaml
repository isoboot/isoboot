name: Tag Release & E2E Test

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.0.1-rc1)"
        required: true

permissions:
  contents: read
  packages: write

concurrency:
  group: tag-release-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/isoboot/isoboot
  KIND_VERSION: v0.31.0
  # Rocky Linux 10.1 — SHA-256 digests from .treeinfo
  VMLINUZ_SHA256: "242531e62b1170f3306a6b903033f44ae7cf68f2a610142bdb5281249a1e6607"
  INITRD_SHA256: "07ec303514509b4ddbfe8df90f65dddaf48519f25b416a2a5368903fe39c627a"

jobs:
  release-and-test:
    name: Release & E2E DHCP + Kind + Rocky 10.1
    # isc-dhcp-client may be removed from future ubuntu-latest — accepted risk.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@v4

    - name: Parse version
      id: version
      env:
        INPUT_VERSION: ${{ inputs.version }}
      run: |
        if [ -n "$INPUT_VERSION" ]; then
          echo "version=$INPUT_VERSION" >> "$GITHUB_OUTPUT"
        else
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
        fi

    # ── Build & push to GHCR ────────────────────────────────────────
    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push multi-arch image
      uses: docker/build-push-action@v6
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: |
          ${{ env.IMAGE }}:${{ steps.version.outputs.version }}
          ${{ !contains(steps.version.outputs.version, '-') && format('{0}:latest', env.IMAGE) || '' }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push dnsmasq image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: Dockerfile.dnsmasq
        platforms: linux/amd64,linux/arm64
        push: true
        tags: |
          ${{ env.IMAGE }}-dnsmasq:${{ steps.version.outputs.version }}
          ${{ !contains(steps.version.outputs.version, '-') && format('{0}-dnsmasq:latest', env.IMAGE) || '' }}
        cache-from: type=gha,scope=dnsmasq
        cache-to: type=gha,mode=max,scope=dnsmasq

    - name: Build and push httpd image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: Dockerfile.httpd
        platforms: linux/amd64,linux/arm64
        push: true
        tags: |
          ${{ env.IMAGE }}-httpd:${{ steps.version.outputs.version }}
          ${{ !contains(steps.version.outputs.version, '-') && format('{0}-httpd:latest', env.IMAGE) || '' }}
        cache-from: type=gha,scope=httpd
        cache-to: type=gha,mode=max,scope=httpd

    - uses: azure/setup-helm@v4

    - name: Package and push Helm chart
      env:
        VERSION: ${{ steps.version.outputs.version }}
      run: |
        sed -i "s/^version:.*/version: ${VERSION}/" charts/isoboot/Chart.yaml
        sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" charts/isoboot/Chart.yaml
        helm package charts/isoboot --destination /tmp/charts
        helm push /tmp/charts/isoboot-${VERSION}.tgz oci://${REGISTRY}/isoboot/charts

    # ── PXE network: ns1=DHCP server, ns2=Kind node, ns3=wget client ──
    - name: Install network tools
      run: sudo apt-get update -qq && sudo apt-get install -y -qq isc-dhcp-client qemu-system-x86 qemu-utils ovmf

    - name: Enable KVM
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
          | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules
        sudo udevadm trigger --name-match=kvm

    - name: Install kind
      run: |
        curl -Lo ./kind https://kind.sigs.k8s.io/dl/${{ env.KIND_VERSION }}/kind-linux-amd64
        chmod +x ./kind && sudo mv ./kind /usr/local/bin/kind

    - name: Create PXE bridge
      run: |
        sudo ip link add br-pxe type bridge
        sudo ip link set br-pxe up
        sudo mkdir -p /var/run/netns

    # E2E uses plain alpine for the DHCP server — the pre-built dnsmasq
    # image is for the chart (production). The E2E container runs a
    # different dnsmasq config and needs root for privileged ports.
    - name: Start DHCP server container (ns1 — 192.168.101.1)
      run: |
        docker run -d --name dhcp-srv \
          --cap-add=NET_ADMIN --cap-add=NET_BIND_SERVICE \
          alpine:3.23 sleep infinity

        docker exec dhcp-srv apk add --no-cache dnsmasq

        # Link container netns so ip-netns can manage it
        SRV_PID=$(docker inspect -f '{{.State.Pid}}' dhcp-srv)
        sudo ln -sf /proc/$SRV_PID/ns/net /var/run/netns/ns1

        # Attach to bridge with static IP 192.168.101.1/24
        sudo ip link add veth-ns1 type veth peer name veth-ns1-br
        sudo ip link set veth-ns1-br master br-pxe
        sudo ip link set veth-ns1-br up
        sudo ip link set veth-ns1 netns "$SRV_PID"
        sudo ip netns exec ns1 ip addr add 192.168.101.1/24 dev veth-ns1
        sudo ip netns exec ns1 ip link set veth-ns1 up
        sudo ip netns exec ns1 ip link set lo up

        # Start dnsmasq inside the container
        docker exec -d dhcp-srv dnsmasq \
          --no-daemon \
          --interface=veth-ns1 \
          --bind-interfaces \
          --dhcp-range=192.168.101.100,192.168.101.200,255.255.255.0,1h \
          --dhcp-option=option:router,192.168.101.1 \
          --log-dhcp \
          --log-facility=/tmp/dnsmasq.log

        # Wait for dnsmasq to be ready
        for i in 1 2 3 4 5; do
          docker exec dhcp-srv pgrep dnsmasq 2>/dev/null && break
          sleep 1
        done
        docker exec dhcp-srv pgrep dnsmasq || { echo "FAIL: dnsmasq not running"; docker logs dhcp-srv; exit 1; }
        echo "DHCP server running at 192.168.101.1 (ns1)"

    # ── Kind cluster ─────────────────────────────────────────────────
    - name: Create host data directory
      run: |
        sudo mkdir -p /tmp/isoboot-data
        sudo chown 65532:65532 /tmp/isoboot-data

    - name: Create Kind cluster
      run: |
        cat <<EOF | kind create cluster --name pxe-test --config=-
        kind: Cluster
        apiVersion: kind.x-k8s.io/v1alpha4
        nodes:
        - role: control-plane
          extraMounts:
          - hostPath: /tmp/isoboot-data
            containerPath: /data/isoboot
        EOF

    - name: Connect Kind node to PXE bridge (ns2 — DHCP client)
      run: |
        KIND_CONTAINER=$(docker ps -qf "name=pxe-test-control-plane")
        KIND_PID=$(docker inspect -f '{{.State.Pid}}' "$KIND_CONTAINER")

        # Link Kind container netns so ip-netns can manage it
        sudo mkdir -p /var/run/netns
        sudo ln -sf /proc/$KIND_PID/ns/net /var/run/netns/ns2

        # Attach veth to bridge
        sudo ip link add veth-ns2 type veth peer name veth-ns2-br
        sudo ip link set veth-ns2-br master br-pxe
        sudo ip link set veth-ns2-br up
        sudo ip link set veth-ns2 netns "$KIND_PID"
        sudo ip netns exec ns2 ip link set veth-ns2 up

        # Get DHCP lease from dnsmasq
        sudo ip netns exec ns2 dhclient -v veth-ns2

        # Show and capture assigned IP
        sudo ip netns exec ns2 ip addr show veth-ns2
        KIND_PXE_IP=$(sudo ip netns exec ns2 ip -4 -o addr show veth-ns2 | grep -oP '192\.168\.101\.\d+' | head -1)
        [ -n "$KIND_PXE_IP" ] || { echo "FAIL: dhclient did not obtain a 192.168.101.x lease"; exit 1; }
        echo "Kind node got DHCP IP: $KIND_PXE_IP (ns2)"
        echo "$KIND_PXE_IP" > /tmp/kind-pxe-ip
        echo "8080" > /tmp/kind-pxe-port

        # Verify bidirectional connectivity (ns2 <-> ns1)
        sudo ip netns exec ns2 ping -c 3 192.168.101.1
        sudo ip netns exec ns1 ping -c 3 "$KIND_PXE_IP"
        echo "PXE network OK: ns1(.1) <-> ns2($KIND_PXE_IP)"

    # ── Deploy isoboot from GHCR ─────────────────────────────────────
    - name: Get Kind node name
      id: node
      run: echo "name=$(kubectl get nodes -o jsonpath='{.items[0].metadata.name}')" >> "$GITHUB_OUTPUT"

    - name: Helm install from GHCR
      env:
        VERSION: ${{ steps.version.outputs.version }}
        NODE_NAME: ${{ steps.node.outputs.name }}
      run: |
        helm install isoboot oci://${REGISTRY}/isoboot/charts/isoboot \
          --version "${VERSION}" \
          --namespace isoboot-system \
          --create-namespace \
          --set nodeName="${NODE_NAME}" \
          --set dnsmasq.subnet=192.168.101.0/24

    - name: Wait for controller and nginx
      run: |
        kubectl -n isoboot-system wait --for=condition=Ready \
          pod -l app.kubernetes.io/component=controller --timeout=120s
        kubectl -n isoboot-system wait --for=condition=Ready \
          pod -l app.kubernetes.io/component=nginx --timeout=120s

    - name: Wait for httpd
      run: |
        kubectl -n isoboot-system wait --for=condition=Ready \
          pod -l app.kubernetes.io/component=httpd --timeout=120s
        kubectl -n isoboot-system get pods

    - name: Verify CRDs installed
      run: |
        kubectl get crd bootartifacts.isoboot.github.io
        kubectl get crd bootconfigs.isoboot.github.io

    # ── iPXE boot firmware (created by chart when dnsmasq.enabled) ──
    - name: Wait for iPXE BootArtifact Ready
      run: ./test/e2e/wait-for-resource.sh bootartifact -n isoboot-system isoboot-ipxe

    - name: Wait for dnsmasq pod ready
      run: |
        kubectl -n isoboot-system wait --for=condition=Ready \
          pod -l app.kubernetes.io/component=dnsmasq --timeout=180s
        kubectl -n isoboot-system get pods

    # ── Rocky Linux 10.1 boot artifacts ──────────────────────────────
    - name: Apply Rocky Linux 10.1 example manifest
      run: kubectl -n isoboot-system apply -f examples/rocky-10.1.yaml

    - name: Wait for BootArtifacts Ready
      run: |
        ./test/e2e/wait-for-resource.sh bootartifact -n isoboot-system rocky-10.1-kernel
        ./test/e2e/wait-for-resource.sh bootartifact -n isoboot-system rocky-10.1-initrd

    - name: Verify artifact SHA-256 on host disk
      run: |
        echo "${{ env.VMLINUZ_SHA256 }}  /tmp/isoboot-data/artifacts/rocky-10.1-kernel/vmlinuz" | sha256sum -c
        echo "${{ env.INITRD_SHA256 }}  /tmp/isoboot-data/artifacts/rocky-10.1-initrd/initrd.img" | sha256sum -c

    - name: Wait for BootConfig Ready
      run: ./test/e2e/wait-for-resource.sh bootconfig -n isoboot-system rocky-10.1

    - name: Verify BootConfig symlinks on host disk
      run: |
        # Verify kernel symlink
        target=$(readlink /tmp/isoboot-data/boot/rocky-10.1/kernel/vmlinuz)
        echo "kernel symlink target: $target"
        [ "$target" = "../../../artifacts/rocky-10.1-kernel/vmlinuz" ] || { echo "FAIL: wrong kernel target"; exit 1; }

        # Verify initrd symlink
        target=$(readlink /tmp/isoboot-data/boot/rocky-10.1/initrd/initrd.img)
        echo "initrd symlink target: $target"
        [ "$target" = "../../../artifacts/rocky-10.1-initrd/initrd.img" ] || { echo "FAIL: wrong initrd target"; exit 1; }

        # Verify symlinks resolve to actual files
        test -f /tmp/isoboot-data/boot/rocky-10.1/kernel/vmlinuz || { echo "FAIL: kernel doesn't resolve"; exit 1; }
        test -f /tmp/isoboot-data/boot/rocky-10.1/initrd/initrd.img || { echo "FAIL: initrd doesn't resolve"; exit 1; }

    # ── Verify auto-generated boot script ─────────────────────────
    - name: Verify boot.ipxe auto-generated
      run: |
        test -f /tmp/isoboot-data/boot/boot.ipxe || { echo "FAIL: boot.ipxe not found"; exit 1; }
        grep 'chain' /tmp/isoboot-data/boot/boot.ipxe || { echo "FAIL: boot.ipxe missing chain directive"; exit 1; }
        grep 'conditional-boot' /tmp/isoboot-data/boot/boot.ipxe || { echo "FAIL: boot.ipxe missing conditional-boot"; exit 1; }
        echo "boot.ipxe auto-generated correctly:"
        cat /tmp/isoboot-data/boot/boot.ipxe

    # ── PXE download test: ns3 wget client ─────────────────────────
    - name: Start wget client container (ns3)
      run: |
        docker run -d --name wget-client --network=none --cap-add=NET_ADMIN \
          alpine:3.23 sh -c "sleep infinity"

        CLIENT_PID=$(docker inspect -f '{{.State.Pid}}' wget-client)
        sudo ln -sf /proc/$CLIENT_PID/ns/net /var/run/netns/ns3

        sudo ip link add veth-ns3 type veth peer name veth-ns3-br
        sudo ip link set veth-ns3-br master br-pxe
        sudo ip link set veth-ns3-br up
        sudo ip link set veth-ns3 netns "$CLIENT_PID"
        sudo ip netns exec ns3 ip link set veth-ns3 up
        sudo ip netns exec ns3 ip link set lo up

        # Get DHCP lease
        sudo ip netns exec ns3 dhclient -v veth-ns3
        sudo ip netns exec ns3 ip addr show veth-ns3
        echo "wget client ready (ns3)"

    - name: Download boot artifacts via PXE network (ns3 -> nginx on ns2)
      run: |
        KIND_PXE_IP=$(cat /tmp/kind-pxe-ip)
        KIND_PXE_PORT=$(cat /tmp/kind-pxe-port)
        docker exec wget-client wget -O /tmp/dl-vmlinuz \
          "http://${KIND_PXE_IP}:${KIND_PXE_PORT}/static/rocky-10.1/kernel/vmlinuz"
        docker exec wget-client wget -O /tmp/dl-initrd \
          "http://${KIND_PXE_IP}:${KIND_PXE_PORT}/static/rocky-10.1/initrd/initrd.img"

    - name: Verify downloaded artifact checksums
      run: |
        docker exec wget-client sh -c \
          "echo '${VMLINUZ_SHA256}  /tmp/dl-vmlinuz' | sha256sum -c"
        docker exec wget-client sh -c \
          "echo '${INITRD_SHA256}  /tmp/dl-initrd' | sha256sum -c"

    - name: Create Machine and Provision resources
      run: |
        kubectl -n isoboot-system apply -f - <<'EOF'
        apiVersion: isoboot.github.io/v1alpha1
        kind: Machine
        metadata:
          name: test-machine
        spec:
          mac: "00-11-22-33-44-55"
        ---
        apiVersion: isoboot.github.io/v1alpha1
        kind: Machine
        metadata:
          name: qemu-machine
        spec:
          mac: "52-54-00-00-00-01"
        ---
        apiVersion: isoboot.github.io/v1alpha1
        kind: ProvisionAnswer
        metadata:
          name: test-answer
        spec:
          files:
            kickstart.cfg: "# test"
        ---
        apiVersion: isoboot.github.io/v1alpha1
        kind: Provision
        metadata:
          name: test-provision
        spec:
          machineRef: test-machine
          bootConfigRef: rocky-10.1
          provisionAnswerRef: test-answer
        ---
        apiVersion: isoboot.github.io/v1alpha1
        kind: Provision
        metadata:
          name: qemu-provision
        spec:
          machineRef: qemu-machine
          bootConfigRef: rocky-10.1
          provisionAnswerRef: test-answer
        EOF
        kubectl -n isoboot-system patch provision test-provision \
          --subresource=status --type=merge -p '{"status":{"phase":"Pending"}}'
        kubectl -n isoboot-system patch provision qemu-provision \
          --subresource=status --type=merge -p '{"status":{"phase":"Pending"}}'

    - name: Verify dynamic boot endpoint
      run: |
        KIND_PXE_IP=$(cat /tmp/kind-pxe-ip)
        KIND_PXE_PORT=$(cat /tmp/kind-pxe-port)
        docker exec wget-client wget -qO /tmp/dynamic-boot \
          "http://${KIND_PXE_IP}:${KIND_PXE_PORT}/dynamic/conditional-boot?mac=00-11-22-33-44-55"
        echo "=== dynamic boot response ==="
        docker exec wget-client cat /tmp/dynamic-boot
        docker exec wget-client grep '#!ipxe' /tmp/dynamic-boot \
          || { echo "FAIL: missing #!ipxe header"; exit 1; }
        docker exec wget-client grep 'rocky-10.1' /tmp/dynamic-boot \
          || { echo "FAIL: missing rocky-10.1"; exit 1; }
        docker exec wget-client grep '/static/' /tmp/dynamic-boot \
          || { echo "FAIL: missing /static/ paths"; exit 1; }

    # ── PXE boot test: ns4 QEMU VM ──────────────────────────────────
    - name: PXE boot QEMU VM (ns4 — UEFI)
      run: |
        # Locate OVMF firmware
        OVMF_CODE=""
        for f in /usr/share/OVMF/OVMF_CODE_4M.fd /usr/share/OVMF/OVMF_CODE.fd; do
          [ -f "$f" ] && OVMF_CODE="$f" && break
        done
        [ -n "$OVMF_CODE" ] || { echo "FAIL: OVMF firmware not found"; exit 1; }

        OVMF_VARS_SRC=""
        for f in /usr/share/OVMF/OVMF_VARS_4M.fd /usr/share/OVMF/OVMF_VARS.fd; do
          [ -f "$f" ] && OVMF_VARS_SRC="$f" && break
        done
        [ -n "$OVMF_VARS_SRC" ] || { echo "FAIL: OVMF vars not found"; exit 1; }
        cp "$OVMF_VARS_SRC" /tmp/ovmf-vars.fd

        # Create tap device on PXE bridge
        sudo ip tuntap add dev tap-ns4 mode tap
        sudo ip link set tap-ns4 master br-pxe
        sudo ip link set tap-ns4 up

        # Create empty disk
        qemu-img create -f qcow2 /tmp/pxe-test-disk.qcow2 1G

        # Boot QEMU with UEFI PXE
        sudo qemu-system-x86_64 \
          -enable-kvm \
          -m 1024 \
          -cpu host \
          -drive if=pflash,format=raw,readonly=on,file="$OVMF_CODE" \
          -drive if=pflash,format=raw,file=/tmp/ovmf-vars.fd \
          -drive file=/tmp/pxe-test-disk.qcow2,format=qcow2 \
          -netdev tap,id=pxe0,ifname=tap-ns4,script=no,downscript=no \
          -device virtio-net-pci,netdev=pxe0,bootindex=1,mac=52:54:00:00:00:01 \
          -boot n \
          -display none \
          -serial file:/tmp/qemu-serial.log \
          -daemonize \
          -pidfile /tmp/qemu-pxe.pid

        echo "QEMU PXE VM launched (tap-ns4 on br-pxe)"

    - name: Wait for PXE boot to download kernel and initrd
      run: |
        echo "Waiting 90s for QEMU PXE boot to complete downloads..."
        sleep 90

    - name: Verify PXE boot downloaded kernel and initrd
      run: |
        NGINX_POD=$(kubectl -n isoboot-system get pod \
          -l app.kubernetes.io/component=nginx -o jsonpath='{.items[0].metadata.name}')

        echo "=== nginx access log ==="
        kubectl -n isoboot-system exec "$NGINX_POD" -- cat /var/run/access.log

        # Verify kernel was downloaded by iPXE (not wget-client)
        kubectl -n isoboot-system exec "$NGINX_POD" -- cat /var/run/access.log \
          | grep '"GET /static/rocky-10.1/kernel/vmlinuz' \
          | grep '" 200 ' \
          | grep 'iPXE/' \
          || { echo "FAIL: no iPXE HTTP 200 for kernel download"; exit 1; }

        # Verify initrd was downloaded by iPXE (not wget-client)
        kubectl -n isoboot-system exec "$NGINX_POD" -- cat /var/run/access.log \
          | grep '"GET /static/rocky-10.1/initrd/initrd.img' \
          | grep '" 200 ' \
          | grep 'iPXE/' \
          || { echo "FAIL: no iPXE HTTP 200 for initrd download"; exit 1; }

        # Verify dynamic boot endpoint was hit by iPXE
        kubectl -n isoboot-system exec "$NGINX_POD" -- cat /var/run/access.log \
          | grep '"GET /dynamic/conditional-boot' \
          | grep '" 200 ' \
          | grep 'iPXE/' \
          || { echo "FAIL: no iPXE HTTP 200 for dynamic boot endpoint"; exit 1; }

        echo "PXE boot successfully downloaded kernel and initrd via HTTP"

    # ── Final PXE network check ──────────────────────────────────────
    - name: Verify PXE network connectivity
      run: |
        KIND_PXE_IP=$(cat /tmp/kind-pxe-ip)
        sudo ip netns exec ns1 ping -c 3 "$KIND_PXE_IP"
        sudo ip netns exec ns2 ping -c 3 192.168.101.1
        sudo ip netns exec ns3 ping -c 3 192.168.101.1
        echo "PXE network fully operational (ns1, ns2, ns3)"

    # ── Failure diagnostics ──────────────────────────────────────────
    - name: Collect logs on failure
      if: failure()
      run: |
        echo "=== Bridge ==="
        ip addr show br-pxe 2>/dev/null || true
        bridge link show master br-pxe 2>/dev/null || true
        echo "=== DHCP server (ns1) ==="
        sudo ip netns exec ns1 ip addr 2>/dev/null || true
        echo "=== Kind node (ns2) ==="
        sudo ip netns exec ns2 ip addr 2>/dev/null || true
        echo "=== wget client (ns3) ==="
        sudo ip netns exec ns3 ip addr 2>/dev/null || true
        echo "=== dnsmasq DHCP logs ==="
        docker exec dhcp-srv cat /tmp/dnsmasq.log 2>/dev/null || true
        echo "=== dnsmasq container logs ==="
        docker logs dhcp-srv 2>/dev/null || true
        echo "=== BootArtifact status ==="
        kubectl -n isoboot-system get bootartifact -o yaml 2>/dev/null || true
        echo "=== BootConfig status ==="
        kubectl -n isoboot-system get bootconfig -o yaml 2>/dev/null || true
        echo "=== Controller logs ==="
        kubectl -n isoboot-system logs -l app.kubernetes.io/name=isoboot --tail=100 2>/dev/null || true
        echo "=== httpd logs ==="
        kubectl -n isoboot-system logs -l app.kubernetes.io/component=httpd --tail=50 2>/dev/null || true
        echo "=== Nginx logs ==="
        kubectl -n isoboot-system logs -l app.kubernetes.io/component=nginx --tail=50 2>/dev/null || true
        echo "=== Nginx resolve-dns init container logs ==="
        kubectl -n isoboot-system logs -l app.kubernetes.io/component=nginx -c resolve-dns --tail=50 2>/dev/null || true
        echo "=== dnsmasq generate-boot-ipxe init container logs ==="
        kubectl -n isoboot-system logs -l app.kubernetes.io/component=dnsmasq -c generate-boot-ipxe --tail=50 2>/dev/null || true
        echo "=== Nginx access log ==="
        NGINX_POD=$(kubectl -n isoboot-system get pod -l app.kubernetes.io/component=nginx -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
        kubectl -n isoboot-system exec "$NGINX_POD" -- cat /var/run/access.log 2>/dev/null || true
        echo "=== dnsmasq pod logs ==="
        kubectl -n isoboot-system logs -l app.kubernetes.io/component=dnsmasq --tail=100 2>/dev/null || true
        echo "=== QEMU serial log ==="
        cat /tmp/qemu-serial.log 2>/dev/null || true
        echo "=== Events ==="
        kubectl -n isoboot-system get events --sort-by='.lastTimestamp' 2>/dev/null || true
        echo "=== Host data directory ==="
        find /tmp/isoboot-data -type f -o -type l 2>/dev/null || true
        echo "=== Describe pods ==="
        kubectl -n isoboot-system describe pod -l app.kubernetes.io/name=isoboot 2>/dev/null || true

    - name: Clean up
      if: always()
      run: |
        [ -f /tmp/qemu-pxe.pid ] && sudo kill "$(cat /tmp/qemu-pxe.pid)" 2>/dev/null || true
        sudo ip link del tap-ns4 2>/dev/null || true
        kind delete cluster --name pxe-test 2>/dev/null || true
        docker rm -f dhcp-srv wget-client 2>/dev/null || true
        sudo rm -f /var/run/netns/ns1 /var/run/netns/ns2 /var/run/netns/ns3
        sudo ip link del br-pxe 2>/dev/null || true
