# This patch adds the --data-dir flag and a hostPath volume for artifact storage.
- op: add
  path: /spec/template/spec/containers/0/args/-
  value: --data-dir=/data/isoboot
- op: add
  path: /spec/template/spec/containers/0/volumeMounts/-
  value:
    name: data
    mountPath: /data/isoboot
- op: add
  path: /spec/template/spec/volumes/-
  value:
    name: data
    hostPath:
      path: /data/isoboot
      type: DirectoryOrCreate
