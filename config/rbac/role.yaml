---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - isoboot.github.io
  resources:
  - bootartifacts
  - bootconfigs
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - isoboot.github.io
  resources:
  - bootartifacts/finalizers
  - bootconfigs/finalizers
  verbs:
  - update
- apiGroups:
  - isoboot.github.io
  resources:
  - bootartifacts/status
  - bootconfigs/status
  verbs:
  - get
  - patch
  - update
