---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: bootconfigs.isoboot.github.io
spec:
  group: isoboot.github.io
  names:
    kind: BootConfig
    listKind: BootConfigList
    plural: bootconfigs
    singular: bootconfig
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: BootConfig is the Schema for the bootconfigs API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of BootConfig
            properties:
              firmware:
                description: |-
                  firmware defines the firmware archive artifact (mode A only).
                  When set, the controller concatenates initrd + firmware into the served initrd.
                properties:
                  ref:
                    description: |-
                      ref is the name of the BootArtifact for the firmware archive.
                      When set, the controller concatenates initrd + firmware into the served initrd.
                    minLength: 1
                    type: string
                required:
                - ref
                type: object
              initrd:
                description: initrd defines the initrd artifact (mode A).
                properties:
                  ref:
                    description: ref is the name of the BootArtifact for the initrd.
                    minLength: 1
                    type: string
                required:
                - ref
                type: object
              iso:
                description: iso defines ISO extraction configuration (mode B).
                properties:
                  artifactRef:
                    description: artifactRef is the name of the BootArtifact for the
                      ISO file.
                    minLength: 1
                    type: string
                  initrdPath:
                    description: initrdPath is the path to the initrd within the ISO.
                    minLength: 1
                    type: string
                  kernelPath:
                    description: kernelPath is the path to the kernel within the ISO.
                    minLength: 1
                    type: string
                required:
                - artifactRef
                - initrdPath
                - kernelPath
                type: object
              kernel:
                description: kernel defines the kernel artifact and boot arguments
                  (mode A).
                properties:
                  args:
                    description: |-
                      args is the kernel boot arguments template string.
                      May contain Go template variables for interpolation at provision time.
                    type: string
                  ref:
                    description: ref is the name of the BootArtifact for the kernel.
                    minLength: 1
                    type: string
                required:
                - ref
                type: object
            type: object
            x-kubernetes-validations:
            - message: must use either kernel+initrd or iso, not both
              rule: (has(self.kernel) && has(self.initrd) && !has(self.iso)) || (!has(self.kernel)
                && !has(self.initrd) && has(self.iso))
            - message: firmware is not supported with iso mode
              rule: '!has(self.iso) || !has(self.firmware)'
          status:
            description: status defines the observed state of BootConfig
            properties:
              message:
                description: message provides human-readable details about the current
                  phase.
                type: string
              phase:
                description: phase is the current phase of the boot config.
                enum:
                - Pending
                - Ready
                - Error
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
