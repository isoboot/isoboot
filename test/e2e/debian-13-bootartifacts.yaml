# Template for envsubst — variables listed here must match the envsubst
# call in test-e2e-hostpath.yml. Update both if adding/removing variables.
apiVersion: isoboot.github.io/v1alpha1
kind: BootArtifact
metadata:
  name: "${VMLINUZ_NAME}"
spec:
  url: "${VMLINUZ_URL}"
  sha256: "${VMLINUZ_SHA256}"
---
apiVersion: isoboot.github.io/v1alpha1
kind: BootArtifact
metadata:
  name: "${INITRD_NAME}"
spec:
  url: "${INITRD_URL}"
  sha256: "${INITRD_SHA256}"
