apiVersion: v1
kind: ConfigMap
metadata:
  name: "{{ include "isoboot.fullname" . }}-nginx-config"
  namespace: "{{ .Release.Namespace }}"
  labels:
    {{- include "isoboot.labels" . | nindent 4 }}
data:
  nginx.conf: |
    pid /var/run/nginx.pid;
    worker_processes 1;
    events { worker_connections 128; }
    http {
        include /etc/nginx/mime.types;
        default_type application/octet-stream;
        access_log /var/run/access.log;
        sendfile on;
        server {
            listen {{ .Values.nginx.port }};
            location /static/ {
                alias "{{ .Values.dataDir }}/boot/";
            }
            location /dynamic/ {
                resolver __DNS_RESOLVER__ valid=5s ipv6=off;
                set $upstream "http://{{ include "isoboot.fullname" . }}-httpd.{{ .Release.Namespace }}.svc.__CLUSTER_DOMAIN__:{{ .Values.httpd.port }}";
                rewrite ^/dynamic/(.*) /$1 break;
                proxy_pass $upstream;
                proxy_connect_timeout 5s;
                proxy_read_timeout 5s;
                proxy_set_header X-Forwarded-Host $host;
                proxy_set_header X-Forwarded-Port "{{ .Values.nginx.port }}";
            }
        }
    }
