apiVersion: v1
kind: Service
metadata:
  name: {{ printf "%s-metrics-service" (include "isoboot.fullname" .) | trunc 63 | trimSuffix "-" }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "isoboot.labels" . | nindent 4 }}
spec:
  ports:
  - name: https
    port: 8443
    protocol: TCP
    targetPort: 8443
  selector:
    {{- include "isoboot.selectorLabels" . | nindent 4 }}
