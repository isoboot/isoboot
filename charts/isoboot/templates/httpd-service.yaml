apiVersion: v1
kind: Service
metadata:
  name: "{{ include "isoboot.fullname" . }}-httpd"
  namespace: "{{ .Release.Namespace }}"
  labels:
    {{- include "isoboot.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
  - name: http
    port: {{ .Values.httpd.port }}
    targetPort: {{ .Values.httpd.port }}
    protocol: TCP
  selector:
    {{- include "isoboot.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: httpd
